<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Key components of an effective seafood traceability system." />
  <title>Seafood Traceability Infographic | TransGenie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #2e9f4d;
      --green-dark: #1f7f3c;
      --green-soft: #eaf7ef;
      --text: #151515;
      --muted: #6b7280;
      --border: #e6eae7;
      --surface: #ffffff;
      --canvas: #f7f7f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background: #fff;
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
    }

    .infographic {
      position: relative;
      isolation: isolate;
      width: min(777px, calc(100vw - 32px));
      min-height: 0;
      margin: 16px auto;
      padding: 48px 52px;
      overflow: hidden;
      border-radius: 30px;
      background: var(--canvas);
    }

    .infographic::before {
      position: absolute;
      z-index: -1;
      inset: 28px;
      border: 2px solid #989898;
      border-radius: 30px;
      content: "";
    }

    .corner-lines {
      position: absolute;
      z-index: -1;
      width: 265px;
      height: 265px;
      border: 1px solid rgba(134, 134, 134, .18);
      border-radius: 50%;
    }

    .corner-lines::before,
    .corner-lines::after {
      position: absolute;
      inset: 32px;
      border: 1px solid rgba(134, 134, 134, .16);
      border-radius: inherit;
      content: "";
    }

    .corner-lines::after { inset: 64px; }
    .corner-lines.top { top: -193px; left: -126px; }
    .corner-lines.bottom { right: -126px; bottom: -193px; }

    .header {
      position: relative;
      max-width: 610px;
      margin: 0 auto 30px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--green);
      font-size: clamp(12px, 1.1vw, 16px);
      font-weight: 600;
      letter-spacing: .08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.8vw, 30px);
      font-weight: 700;
      letter-spacing: -0.055em;
      line-height: 1.14;
    }

    .steps {
      position: relative;
      --grid-gap: clamp(16px, 1.75vw, 28px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: 104px;
      gap: 16px;
      max-width: 673px;
      margin: 0 auto;
    }

    .top-row,
    .bottom-row {
      display: contents;
    }

    .step {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 104px;
      padding: 18px;
      gap: 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 14px 36px rgba(22, 70, 39, .05);
      overflow: hidden;
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .step::after {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(234, 247, 239, .9), rgba(234, 247, 239, 0) 62%);
      content: "";
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .step > * { position: relative; z-index: 1; }

    .step:hover {
      border-color: #cde8d6;
      box-shadow: 0 18px 42px rgba(22, 70, 39, .12);
      transform: translateY(-4px);
    }

    .step:hover::after { opacity: 1; }

    .step:hover .icon-box {
      background: var(--green);
      color: #fff;
      transform: scale(1.04);
    }

    .node-1 { grid-column: 1; grid-row: 1; }
    .node-2 { grid-column: 2; grid-row: 1; }
    .node-3 { grid-column: 1; grid-row: 2; }
    .node-4 { grid-column: 2; grid-row: 2; }
    .node-5 { grid-column: 1; grid-row: 3; }
    .node-6 { grid-column: 2; grid-row: 3; }
    .node-7 { grid-column: 1 / -1; grid-row: 4; }

    .step-head {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      margin: 0;
    }

    .icon-box {
      display: grid;
      width: 52px;
      height: 52px;
      place-items: center;
      border-radius: 16px;
      background: var(--green-soft);
      color: var(--green-dark);
      transition: background .25s ease, color .25s ease, transform .25s ease;
    }

    .icon-box svg {
      width: 27px;
      height: 27px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.8;
    }

    h2 {
      margin: 0;
      font-size: clamp(15px, 1.7vw, 18px);
      font-weight: 600;
      letter-spacing: -.025em;
      line-height: 1.32;
    }

    .step-copy { min-width: 0; }

    .step-label {
      display: block;
      margin-bottom: 5px;
      color: var(--green);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .075em;
      line-height: 1;
      text-transform: uppercase;
    }

    .footer-note {
      margin: clamp(21px, 2.7vw, 38px) 0 0;
      color: var(--muted);
      font-size: clamp(12px, 1.05vw, 15px);
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 850px) {
      .infographic { padding: 48px 34px; }
    }

    @media (max-width: 520px) {
      .infographic { width: calc(100vw - 20px); padding: 48px 26px; border-radius: 24px; }
      .infographic::before { inset: 14px; border-radius: 22px; }
      .steps { grid-template-columns: 1fr; grid-auto-rows: auto; }
      .node-1, .node-2, .node-3, .node-4, .node-5, .node-6, .node-7 { grid-column: 1; grid-row: auto; }
      .step { min-height: 96px; padding: 18px; }
      .corner-lines { opacity: .7; }
    }
  </style>
</head>
<body>
  <main class="infographic" aria-labelledby="infographic-title">
    <span class="corner-lines top" aria-hidden="true"></span>
    <span class="corner-lines bottom" aria-hidden="true"></span>

    <header class="header">
      <h1 id="infographic-title">Key Components of an Effective Seafood Traceability System</h1>
    </header>

    <section class="steps" aria-label="Seven key traceability components">
      <div class="top-row">
        <article class="step flow-node node-1">
        <div class="step-head"><span class="icon-box"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 4v24M8 11h16M8 21h16"/><circle cx="16" cy="16" r="4"/></svg></span></div>
        <div class="step-copy"><span class="step-label">Step 1</span><h2>Data Capture</h2></div>
        </article>
        <article class="step flow-node node-2">
        <div class="step-head"><span class="icon-box"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M6 10h20v14H6zM6 14h20M11 10V7h10v3"/><path d="M12 19h8"/></svg></span></div>
        <div class="step-copy"><span class="step-label">Step 2</span><h2>Chain of Custody</h2></div>
        </article>
        <article class="step flow-node node-3">
        <div class="step-head"><span class="icon-box"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M5 8h14l8 8-11 11-11-11z"/><circle cx="12" cy="13" r="1.6"/></svg></span></div>
        <div class="step-copy"><span class="step-label">Step 3</span><h2>Product Identification</h2></div>
        </article>
        <article class="step flow-node node-4">
        <div class="step-head"><span class="icon-box"><svg viewBox="0 0 32 32" aria-hidden="true"><rect x="6" y="7" width="20" height="18" rx="2"/><path d="M10 13h12M10 18h7M21 18h1"/></svg></span></div>
        <div class="step-copy"><span class="step-label">Step 4</span><h2>Batch Tracking</h2></div>
        </article>
      </div>
      <div class="bottom-row">
        <article class="step flow-node node-5">
        <div class="step-head"><span class="icon-box"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M10 4h12l4 4v20H6V4zM18 4v6h6M10 18l3.5 3.5L22 13"/></svg></span></div>
        <div class="step-copy"><span class="step-label">Step 5</span><h2>Compliance Documentation</h2></div>
        </article>
        <article class="step flow-node node-6">
        <div class="step-head"><span class="icon-box"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M10 4h12l4 4v20H6V4zM18 4v6h6M10 18h12M10 22h8"/></svg></span></div>
        <div class="step-copy"><span class="step-label">Step 6</span><h2>Digital Documentation</h2></div>
        </article>
        <article class="step flow-node flow-end node-7">
        <div class="step-head"><span class="icon-box"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M6 24V14M13 24V8M20 24v-5M27 24V5"/><path d="M5 27h23"/></svg></span></div>
        <div class="step-copy"><span class="step-label">Step 7</span><h2>Real-Time Visibility</h2></div>
        </article>
      </div>
    </section>

  </main>
</body>
</html>

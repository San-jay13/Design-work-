<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How to Validate a Web App Idea Before Spending Money</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --page-bg: #f0f4f8;
      --navy: #172640;
      --muted: #5f6f87;
      --border: #dde3ed;
      --shadow-lg: 0 20px 60px rgba(15,23,42,0.10);
      --c1: #e8460e;
      --c2: #2178d4;
      --c3: #15905e;
      --c4: #6d3dd2;
      --c5: #0f9aa5;
      --c6: #c0560f;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
      background: var(--page-bg);
      font-family: "Montserrat", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Outer frame ── */
    .frame {
      width: 855px;
      height: 455px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 24px;
      background:
        radial-gradient(circle at 5% 5%,   rgba(33,120,212,0.06),  transparent 30%),
        radial-gradient(circle at 96% 96%,  rgba(109,61,210,0.06),  transparent 30%),
        var(--white);
      box-shadow: var(--shadow-lg);
    }

    /* inner guide border */
    .frame::after {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(220,225,235,0.8);
      border-radius: 18px;
      pointer-events: none;
      z-index: 30;
    }

    /* ── Canvas ── */
    .canvas {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 40px 28px;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      flex-shrink: 0;
      width: 100%;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
    }
    .frame.go .header { opacity: 1; transform: translateY(0); }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #2178d4;
      margin-bottom: 7px;
    }
    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 28px;
      height: 1.5px;
      background: #2178d4;
      opacity: 0.4;
      border-radius: 2px;
    }

    .page-title {
      color: var(--navy);
      font-size: 24px;
      font-weight: 800;
      line-height: 1.22;
      letter-spacing: -0.3px;
    }

    /* ── Timeline wrapper ── */
    .timeline {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    /* ── Horizontal track (grey bg) ── */
    .track-bg {
      position: absolute;
      top: 28px;
      left: 28px;
      right: 28px;
      height: 3px;
      background: #e2e8f0;
      border-radius: 4px;
      z-index: 0;
    }

    /* ── Animated fill track ── */
    .track-fill {
      position: absolute;
      top: 28px;
      left: 28px;
      height: 3px;
      width: 0%;
      border-radius: 4px;
      background: linear-gradient(90deg,
        var(--c1) 0%,
        var(--c2) 20%,
        var(--c3) 40%,
        var(--c4) 60%,
        var(--c5) 80%,
        var(--c6) 100%
      );
      z-index: 1;
      transition: width 2.2s cubic-bezier(0.4,0,0.2,1) 0.4s;
    }
    .frame.go .track-fill { width: calc(100% - 56px); }

    /* ── Steps row ── */
    .steps {
      display: flex;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    /* ── Single step ── */
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: calc(100% / 6);
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .frame.go .step { opacity: 1; transform: translateY(0); }

    /* node circle */
    .node {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--ac);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      box-shadow:
        0 0 0 4px #fff,
        0 0 0 7px color-mix(in srgb, var(--ac) 25%, transparent),
        0 8px 20px color-mix(in srgb, var(--ac) 35%, transparent);
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .node svg {
      width: 22px;
      height: 22px;
      fill: #fff;
      display: block;
    }

    /* pulse ring on node */
    .node::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2.5px solid var(--ac);
      opacity: 0;
    }
    .frame.go .node::after { animation: nodePulse 2.6s ease-out infinite; }
    @keyframes nodePulse {
      0%  { transform: scale(0.8);  opacity: 0.7; }
      70% { transform: scale(1.55); opacity: 0;   }
      100%{ opacity: 0; }
    }

    /* downward connector arrow */
    .arrow-down {
      width: 2px;
      height: 14px;
      background: var(--ac);
      margin-top: 0;
      position: relative;
      flex-shrink: 0;
    }
    .arrow-down::after {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 6px solid var(--ac);
    }

    /* step card */
    .step-card {
      margin-top: 8px;
      width: 104px;
      height: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, color-mix(in srgb, var(--ac) 10%, #fff), #fff 60%);
      border: 1px solid color-mix(in srgb, var(--ac) 20%, var(--border));
      border-top: 3px solid var(--ac);
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 4px 16px rgba(15,23,42,0.08);
      text-align: center;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .card-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--ac);
    }
    .step:hover .node { transform: scale(1.08); }
    .step.is-active .node {
      transform: scale(1.08);
      box-shadow:
        0 0 0 4px #fff,
        0 0 0 9px color-mix(in srgb, var(--ac) 34%, transparent),
        0 12px 26px color-mix(in srgb, var(--ac) 40%, transparent);
    }
    .step:hover .step-card {
      transform: translateY(-4px);
      box-shadow: 0 10px 26px rgba(15,23,42,0.13);
    }
    .step.is-active .step-card {
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--ac) 42%, var(--border));
      box-shadow: 0 10px 26px rgba(15,23,42,0.13);
    }

    /* stagger delays */
    .step:nth-child(1) { transition-delay: 0.30s; }
    .step:nth-child(2) { transition-delay: 0.65s; }
    .step:nth-child(3) { transition-delay: 1.00s; }
    .step:nth-child(4) { transition-delay: 1.35s; }
    .step:nth-child(5) { transition-delay: 1.70s; }
    .step:nth-child(6) { transition-delay: 2.05s; }
    .step:nth-child(n) .node::after { animation-delay: calc((n - 1) * 0.35s); }

    /* pulse delay per step */
    .step:nth-child(1) .node::after { animation-delay: 0.30s; }
    .step:nth-child(2) .node::after { animation-delay: 0.65s; }
    .step:nth-child(3) .node::after { animation-delay: 1.00s; }
    .step:nth-child(4) .node::after { animation-delay: 1.35s; }
    .step:nth-child(5) .node::after { animation-delay: 1.70s; }
    .step:nth-child(6) .node::after { animation-delay: 2.05s; }

    .step-detail {
      width: min(590px, 100%);
      min-height: 70px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      margin: 22px auto 0;
      padding: 14px 18px;
      border: 1px solid color-mix(in srgb, var(--detail-accent, var(--c1)) 26%, var(--border));
      border-radius: 16px;
      background: linear-gradient(160deg, color-mix(in srgb, var(--detail-accent, var(--c1)) 9%, #fff), #fff 64%);
      box-shadow: 0 8px 22px rgba(15,23,42,0.08);
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 0.24s ease, transform 0.24s ease, border-color 0.24s ease, background 0.24s ease;
    }

    .step-detail.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .detail-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--detail-accent, var(--c1));
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .detail-heading {
      color: var(--navy);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.28;
    }

    /* ── "PROCESS" label below track ── */
    .track-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      padding: 0 28px;
      opacity: 0;
      transition: opacity 0.5s ease 2.5s;
    }
    .frame.go .track-label { opacity: 1; }
    .track-label span {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #a0aec0;
    }
    .track-label .tl-arrow {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #cbd5e0, transparent);
      margin: 0 8px;
    }

    @media (prefers-reduced-motion: reduce) {
      .header, .step { transition: none; opacity: 1; transform: none; }
      .track-fill    { transition: none; width: calc(100% - 56px); }
      .track-label   { transition: none; opacity: 1; }
      .node::after   { animation: none; }
    }
  </style>
</head>
<body>
<main class="frame" id="frame">
  <div class="canvas">

    <!-- Header -->
    <div class="header">
      <h1 class="page-title">How to Validate a Web App Idea Before Spending Money</h1>
    </div>

    <!-- Timeline -->
    <div class="timeline">
      <div class="track-bg"></div>
      <div class="track-fill"></div>

      <div class="steps">

        <!-- Step 1 -->
        <button class="step" type="button" style="--ac:var(--c1);" data-label="Step 01" data-heading="Search for it on Google" aria-label="Step 01: Search for it on Google" aria-expanded="false">
          <div class="node">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </div>
          <div class="arrow-down"></div>
          <div class="step-card">
            <span class="card-label">Step 01</span>
          </div>
        </button>

        <!-- Step 2 -->
        <button class="step" type="button" style="--ac:var(--c2);" data-label="Step 02" data-heading="Talk to 10 Real People First" aria-label="Step 02: Talk to 10 Real People First" aria-expanded="false">
          <div class="node">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          </div>
          <div class="arrow-down"></div>
          <div class="step-card">
            <span class="card-label">Step 02</span>
          </div>
        </button>

        <!-- Step 3 -->
        <button class="step" type="button" style="--ac:var(--c3);" data-label="Step 03" data-heading="Build a Landing Page Before the App" aria-label="Step 03: Build a Landing Page Before the App" aria-expanded="false">
          <div class="node">
            <svg viewBox="0 0 24 24"><path d="M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V8h10v2z"/></svg>
          </div>
          <div class="arrow-down"></div>
          <div class="step-card">
            <span class="card-label">Step 03</span>
          </div>
        </button>

        <!-- Step 4 -->
        <button class="step" type="button" style="--ac:var(--c4);" data-label="Step 04" data-heading="Study Your Competitors Honestly" aria-label="Step 04: Study Your Competitors Honestly" aria-expanded="false">
          <div class="node">
            <svg viewBox="0 0 24 24"><path d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27H15l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.516 6.516 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5zm-1 2h2v2.5H13v2h-2.5V14h-2v-2.5H6v-2h2.5V7z"/></svg>
          </div>
          <div class="arrow-down"></div>
          <div class="step-card">
            <span class="card-label">Step 04</span>
          </div>
        </button>

        <!-- Step 5 -->
        <button class="step" type="button" style="--ac:var(--c5);" data-label="Step 05" data-heading="Ask Someone to Pay Before You Build" aria-label="Step 05: Ask Someone to Pay Before You Build" aria-expanded="false">
          <div class="node">
            <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
          </div>
          <div class="arrow-down"></div>
          <div class="step-card">
            <span class="card-label">Step 05</span>
          </div>
        </button>

        <!-- Step 6 -->
        <button class="step" type="button" style="--ac:var(--c6);" data-label="Step 06" data-heading="Build a No-Code Prototype First" aria-label="Step 06: Build a No-Code Prototype First" aria-expanded="false">
          <div class="node">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
          </div>
          <div class="arrow-down"></div>
          <div class="step-card">
            <span class="card-label">Step 06</span>
          </div>
        </button>

      </div><!-- /steps -->

      <div class="step-detail" id="step-detail" aria-live="polite">
        <span class="detail-label" id="detail-label">Step 01</span>
        <h2 class="detail-heading" id="detail-heading">Search for it on Google</h2>
      </div>

      <!-- Process flow label -->
      <div class="track-label">
        <span>Start</span>
        <div class="tl-arrow"></div>
        <span>Validation Journey</span>
        <div class="tl-arrow" style="background:linear-gradient(90deg,transparent,#cbd5e0);"></div>
        <span>Prototype Ready</span>
      </div>

    </div><!-- /timeline -->
  </div><!-- /canvas -->
</main>

<script>
  const frame = document.getElementById('frame');
  const steps = document.querySelectorAll('.step');
  const detail = document.getElementById('step-detail');
  const detailLabel = document.getElementById('detail-label');
  const detailHeading = document.getElementById('detail-heading');

  function kick() { frame.classList.add('go'); }

  steps.forEach((step) => {
    step.addEventListener('click', () => {
      const isActive = step.classList.contains('is-active');

      steps.forEach((item) => {
        item.classList.remove('is-active');
        item.setAttribute('aria-expanded', 'false');
      });

      if (isActive) {
        detail.classList.remove('is-open');
        return;
      }

      step.classList.add('is-active');
      step.setAttribute('aria-expanded', 'true');
      detailLabel.textContent = step.dataset.label;
      detailHeading.textContent = step.dataset.heading;
      detail.style.setProperty('--detail-accent', getComputedStyle(step).getPropertyValue('--ac').trim());
      detail.classList.add('is-open');
    });
  });

  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver(e => {
      if (e[0].isIntersecting) { kick(); obs.disconnect(); }
    }, { threshold: 0.2 });
    obs.observe(frame);
  } else {
    kick();
  }
</script>
</body>
</html>

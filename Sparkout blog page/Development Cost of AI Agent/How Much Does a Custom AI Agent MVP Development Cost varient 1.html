<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How Much Does a Custom AI Agent MVP Development Cost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --frame-width: 855px;
      --frame-height: 551px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --navy: #192a44;
      --border: #e5e7eb;
      --orange: #ff6c1a;
      --orange-end: #ff4d0d;
      --blue: #1f78d1;
      --green: #128456;
      --soft-orange: #fff3ec;
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
      background: var(--page-bg);
      color: var(--navy);
      font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .blog-frame {
      width: var(--frame-width);
      height: var(--frame-height);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        linear-gradient(135deg, rgba(255, 243, 236, 0.88), rgba(255, 255, 255, 0) 38%),
        var(--white);
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .blog-frame::after {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: 16px;
      pointer-events: none;
      z-index: 4;
    }

    .canvas {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 42px;
    }

    .header {
      max-width: 720px;
      margin: 0 auto 18px;
      text-align: center;
    }

    .page-title {
      color: var(--navy);
      font-size: 28px;
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .panel-grid {
      width: 100%;
      max-width: 744px;
      height: 402px;
      display: grid;
      gap: 14px;
      margin: 0 auto;
      transition: grid-template-columns 0.28s ease;
    }

    .panel-grid.active-poc { grid-template-columns: 1.35fr 0.86fr 0.86fr; }
    .panel-grid.active-mvp { grid-template-columns: 0.86fr 1.35fr 0.86fr; }
    .panel-grid.active-full { grid-template-columns: 0.86fr 0.86fr 1.35fr; }

    .cost-panel {
      position: relative;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      padding: 26px 18px 22px;
      border: 1px solid rgba(229, 231, 235, 0.96);
      border-radius: 18px;
      background: var(--panel-color);
      color: var(--white);
      font: inherit;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transform: translateY(0);
      transition: transform 0.24s ease, box-shadow 0.24s ease, filter 0.24s ease;
    }

    .cost-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.28), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
      pointer-events: none;
    }

    .cost-panel::after {
      content: "";
      position: absolute;
      inset: auto 18px 18px 18px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      pointer-events: none;
    }

    .cost-panel:hover,
    .cost-panel:focus-visible,
    .cost-panel.is-active {
      outline: none;
      transform: translateY(-4px);
      filter: saturate(1.08);
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.16);
    }

    .cost-panel.is-active::after {
      background: rgba(255, 255, 255, 0.92);
    }

    .panel-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
      width: 100%;
    }

    .panel-icon {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.18);
      color: var(--white);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: width 0.24s ease, height 0.24s ease;
    }

    .cost-panel.is-active .panel-icon {
      width: 78px;
      height: 78px;
    }

    .panel-icon svg {
      width: 35px;
      height: 35px;
      fill: currentColor;
      display: block;
    }

    .panel-title {
      font-size: 21px;
      font-weight: 700;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .cost-panel.is-active .panel-title {
      font-size: 26px;
      line-height: 1.16;
    }

    .panel-cost {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 42px;
      padding: 10px 11px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.12);
    }

    .cost-panel.is-active .panel-cost {
      font-size: 19px;
      background: rgba(255, 255, 255, 0.18);
    }
  </style>
</head>
<body>
  <main class="blog-frame">
    <div class="canvas">
      <header class="header">
        <h1 class="page-title">How Much Does a Custom AI Agent MVP Development Cost</h1>
      </header>

      <section class="panel-grid active-poc" aria-label="AI agent development cost panels">
        <button class="cost-panel is-active" type="button" aria-pressed="true" data-panel="poc" style="--panel-color: var(--orange);">
          <span class="panel-content">
            <span class="panel-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M9 2h6a1 1 0 0 1 0 2h-1v4.42l4.92 7.88A3.7 3.7 0 0 1 15.78 22H8.22a3.7 3.7 0 0 1-3.14-5.7L10 8.42V4H9a1 1 0 0 1 0-2Zm1.67 9-3.9 6.24A1.7 1.7 0 0 0 8.22 20h7.56a1.7 1.7 0 0 0 1.45-2.76L13.33 11h-2.66Z" /></svg>
            </span>
            <span class="panel-title">1. PoC<br>(Proof of Concept)</span>
          </span>
          <span class="panel-cost">Costs $15k–$35k</span>
        </button>

        <button class="cost-panel" type="button" aria-pressed="false" data-panel="mvp" style="--panel-color: var(--blue);">
          <span class="panel-content">
            <span class="panel-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12.8 2.14a1 1 0 0 0-1.6 0L8.68 5.5 4.5 6.72a1 1 0 0 0-.55 1.55l2.56 3.58-.12 4.4a1 1 0 0 0 1.3.98L12 15.72l4.31 1.51a1 1 0 0 0 1.3-.98l-.12-4.4 2.56-3.58a1 1 0 0 0-.55-1.55L15.32 5.5 12.8 2.14ZM8 19a1 1 0 0 0-1.72-.7l-2 2a1 1 0 1 0 1.42 1.4l2-2A1 1 0 0 0 8 19Zm8.7-.7a1 1 0 0 0-1.4 1.42l2 2a1 1 0 0 0 1.4-1.42l-2-2Z" /></svg>
            </span>
            <span class="panel-title">2. MVP<br>(Minimal Viable Product)</span>
          </span>
          <span class="panel-cost">Costs $25k-$60k</span>
        </button>

        <button class="cost-panel" type="button" aria-pressed="false" data-panel="full" style="--panel-color: var(--green);">
          <span class="panel-content">
            <span class="panel-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 2.15a1 1 0 0 0-.46.11l-7 3.5A1 1 0 0 0 4 6.65v5.1c0 4.9 3.01 8.2 7.6 10.17a1 1 0 0 0 .8 0c4.59-1.97 7.6-5.27 7.6-10.17v-5.1a1 1 0 0 0-.55-.9l-7-3.5a1 1 0 0 0-.45-.1Zm4.03 7.58a1 1 0 0 1 0 1.42l-4.6 4.6a1 1 0 0 1-1.42 0l-2.04-2.04a1 1 0 1 1 1.42-1.42l1.33 1.34 3.89-3.9a1 1 0 0 1 1.42 0Z" /></svg>
            </span>
            <span class="panel-title">3. Full Product Deployment</span>
          </span>
          <span class="panel-cost">Costs $60k-$150k</span>
        </button>
      </section>
    </div>
  </main>

  <script>
    const grid = document.querySelector(".panel-grid");
    const panels = document.querySelectorAll(".cost-panel");

    panels.forEach((panel) => {
      panel.addEventListener("click", () => {
        panels.forEach((item) => {
          item.classList.toggle("is-active", item === panel);
          item.setAttribute("aria-pressed", item === panel ? "true" : "false");
        });
        grid.className = `panel-grid active-${panel.dataset.panel}`;
      });
    });
  </script>
</body>
</html>

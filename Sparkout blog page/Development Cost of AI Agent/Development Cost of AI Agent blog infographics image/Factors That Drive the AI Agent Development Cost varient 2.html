<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factors That Drive the AI Agent Development Cost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --frame-width: 855px;
      --frame-height: 551px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --navy: #192a44;
      --border: #e5e7eb;
      --orange: #ff6c1a;
      --orange-end: #ff4d0d;
      --soft-orange: #fff3ec;
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 12px 28px rgba(15, 23, 42, 0.07);
      --row-accent: var(--orange);
      --row-accent-end: var(--orange-end);
      --row-soft: var(--soft-orange);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
      background: var(--page-bg);
      color: var(--navy);
      font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .blog-frame {
      width: var(--frame-width);
      height: var(--frame-height);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        linear-gradient(135deg, rgba(255, 243, 236, 0.88), rgba(255, 255, 255, 0) 38%),
        var(--white);
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .blog-frame::after {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: 16px;
      pointer-events: none;
      z-index: 4;
    }

    .canvas {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 42px;
    }

    .header {
      max-width: 720px;
      margin: 0 auto 18px;
      text-align: center;
    }

    .page-title {
      color: var(--navy);
      font-size: 28px;
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .cost-stack {
      width: 100%;
      max-width: 744px;
      height: 405px;
      display: grid;
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin: 0 auto;
    }

    .cost-row {
      position: relative;
      width: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: 58px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 12px 16px;
      border: 1px solid rgba(229, 231, 235, 0.96);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--navy);
      font: inherit;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.045);
      transform: translateY(0);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .cost-row::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: transparent;
      transition: background 0.22s ease;
    }

    .cost-row::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: var(--bar-width);
      height: 4px;
      background: linear-gradient(90deg, var(--row-accent), var(--row-accent-end));
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .cost-row:hover,
    .cost-row:focus-visible,
    .cost-row.is-active {
      outline: none;
      border-color: color-mix(in srgb, var(--row-accent) 46%, transparent);
      background: linear-gradient(180deg, #ffffff 0%, var(--row-soft) 100%);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .cost-row.is-active::before {
      background: linear-gradient(180deg, var(--row-accent), var(--row-accent-end));
    }

    .cost-row.is-active::after {
      opacity: 1;
    }

    .cost-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--row-soft);
      color: var(--row-accent);
      transition: transform 0.22s ease, background 0.22s ease, color 0.22s ease;
    }

    .cost-row.is-active .cost-icon,
    .cost-row:hover .cost-icon,
    .cost-row:focus-visible .cost-icon {
      background: linear-gradient(135deg, var(--row-accent), var(--row-accent-end));
      color: var(--white);
      transform: scale(1.05);
    }

    .cost-icon svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
      display: block;
    }

    .cost-title {
      color: var(--navy);
      font-size: 18px;
      font-weight: 600;
      line-height: 1.24;
      letter-spacing: 0;
    }

    .cost-row.is-active .cost-title,
    .cost-row:hover .cost-title,
    .cost-row:focus-visible .cost-title {
      color: var(--row-accent);
    }

    .cost-price {
      min-width: 164px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 14px;
      border-radius: 999px;
      background: var(--row-soft);
      color: var(--row-accent);
      font-size: 17px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      transition: background 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
    }

    .cost-row.is-active .cost-price,
    .cost-row:hover .cost-price,
    .cost-row:focus-visible .cost-price {
      background: linear-gradient(135deg, var(--row-accent), var(--row-accent-end));
      color: var(--white);
      box-shadow: 0 10px 22px color-mix(in srgb, var(--row-accent) 20%, transparent);
    }
  </style>
</head>
<body>
  <main class="blog-frame">
    <div class="canvas">
      <header class="header">
        <h1 class="page-title">Factors That Drive the<br>AI Agent Development Cost</h1>
      </header>

      <section class="cost-stack">
        <button class="cost-row is-active" type="button" aria-pressed="true" style="--bar-width: 80%; --row-accent: #ff6c1a; --row-accent-end: #ff4d0d; --row-soft: #fff3ec;">
          <span class="cost-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 4.5A2.5 2.5 0 0 1 7.5 2h1A2.5 2.5 0 0 1 11 4.5v1A2.5 2.5 0 0 1 8.5 8h-1A2.5 2.5 0 0 1 5 5.5v-1Zm8 0A2.5 2.5 0 0 1 15.5 2h1A2.5 2.5 0 0 1 19 4.5v1A2.5 2.5 0 0 1 16.5 8h-1A2.5 2.5 0 0 1 13 5.5v-1ZM5 16.5A2.5 2.5 0 0 1 7.5 14h1a2.5 2.5 0 0 1 0 5h-1A2.5 2.5 0 0 1 5 16.5Zm8 0a2.5 2.5 0 0 1 2.5-2.5h1a2.5 2.5 0 0 1 0 5h-1a2.5 2.5 0 0 1-2.5-2.5ZM10.8 7.5a1 1 0 0 1 1.4 0l1.55 1.55a1 1 0 0 1 0 1.4L12.2 12a1 1 0 0 1-1.4 0l-1.55-1.55a1 1 0 0 1 0-1.4L10.8 7.5Z" /></svg>
          </span>
          <span class="cost-title">1. Multi-Agent System (MAS)</span>
          <span class="cost-price">$20,000–$60,000</span>
        </button>

        <button class="cost-row" type="button" aria-pressed="false" style="--bar-width: 62%; --row-accent: #2563eb; --row-accent-end: #1d4ed8; --row-soft: #eff6ff;">
          <span class="cost-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 3a3 3 0 0 0-3 3v11a2 2 0 0 0 2 2h5.2a3 3 0 0 1 2.1.88l.7.7.7-.7a3 3 0 0 1 2.1-.88H20a2 2 0 0 0 2-2V6a3 3 0 0 0-3-3h-4.2a4 4 0 0 0-2.8 1.17A4 4 0 0 0 9.2 3H5Zm1 4h4a1 1 0 1 1 0 2H6a1 1 0 0 1 0-2Zm0 4h5a1 1 0 1 1 0 2H6a1 1 0 1 1 0-2Zm9-4h3a1 1 0 1 1 0 2h-3a1 1 0 1 1 0-2Zm0 4h2a1 1 0 1 1 0 2h-2a1 1 0 1 1 0-2Z" /></svg>
          </span>
          <span class="cost-title">2. Agentic RAG Adoption</span>
          <span class="cost-price">$15,000–$40,000</span>
        </button>

        <button class="cost-row" type="button" aria-pressed="false" style="--bar-width: 34%; --row-accent: #16a34a; --row-accent-end: #15803d; --row-soft: #f0fdf4;">
          <span class="cost-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5Zm0 2.3L18.85 8 12 11.7 5.15 8 12 4.3ZM5 9.7l6 3.25v6.45l-6-3.33V9.7Zm8 9.7v-6.45l6-3.25v6.37l-6 3.33Z" /></svg>
          </span>
          <span class="cost-title">3. Higher LLM Token Consumption</span>
          <span class="cost-price">$2,000–$8,000</span>
        </button>

        <button class="cost-row" type="button" aria-pressed="false" style="--bar-width: 100%; --row-accent: #7c3aed; --row-accent-end: #6d28d9; --row-soft: #f5f3ff;">
          <span class="cost-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2.15a1 1 0 0 0-.46.11l-7 3.5A1 1 0 0 0 4 6.65v5.1c0 4.9 3.01 8.2 7.6 10.17a1 1 0 0 0 .8 0c4.59-1.97 7.6-5.27 7.6-10.17v-5.1a1 1 0 0 0-.55-.9l-7-3.5a1 1 0 0 0-.45-.1Zm4.03 7.58a1 1 0 0 1 0 1.42l-4.6 4.6a1 1 0 0 1-1.42 0l-2.04-2.04a1 1 0 1 1 1.42-1.42l1.33 1.34 3.89-3.9a1 1 0 0 1 1.42 0Z" /></svg>
          </span>
          <span class="cost-title">4. Enterprise Compliance & Security Pressure</span>
          <span class="cost-price">$25,000–$75,000</span>
        </button>

        <button class="cost-row" type="button" aria-pressed="false" style="--bar-width: 58%; --row-accent: #0891b2; --row-accent-end: #0e7490; --row-soft: #ecfeff;">
          <span class="cost-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 3a4 4 0 0 0-4 4v4a4 4 0 1 0 8 0V7a4 4 0 0 0-4-4Zm7 7a1 1 0 0 0-1 1 6 6 0 0 1-12 0 1 1 0 1 0-2 0 8 8 0 0 0 7 7.94V22a1 1 0 1 0 2 0v-2.06A8 8 0 0 0 20 11a1 1 0 0 0-1-1Z" /></svg>
          </span>
          <span class="cost-title">5. Voice & Multi-Model Expansion</span>
          <span class="cost-price">$15,000–$5000</span>
        </button>
      </section>
    </div>
  </main>

  <script>
    const rows = document.querySelectorAll(".cost-row");

    rows.forEach((row) => {
      row.addEventListener("click", () => {
        rows.forEach((item) => {
          item.classList.toggle("is-active", item === row);
          item.setAttribute("aria-pressed", item === row ? "true" : "false");
        });
      });
    });
  </script>
</body>
</html>

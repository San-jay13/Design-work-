<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How AI Agents Deliver ROI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --frame-width: 855px;
      --frame-height: 551px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --navy: #172640;
      --muted: #627189;
      --border: #e4e8ef;
      --orange: #ff6c1a;
      --blue: #2178d4;
      --green: #149060;
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 14px 32px rgba(15, 23, 42, 0.09);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
      background: var(--page-bg);
      color: var(--navy);
      font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .blog-frame {
      width: var(--frame-width);
      height: var(--frame-height);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        radial-gradient(circle at 10% 9%, rgba(255, 108, 26, 0.05), transparent 28%),
        linear-gradient(135deg, rgba(255, 243, 236, 0.38), rgba(255, 255, 255, 0) 40%),
        var(--white);
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .blog-frame::after {
      content: "";
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(229, 231, 235, 0.95);
      border-radius: 16px;
      pointer-events: none;
      z-index: 4;
    }

    .canvas {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 20px;
      padding: 38px 54px 44px;
    }

    .page-title {
      color: var(--navy);
      font-size: 31px;
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: 0;
      text-align: center;
    }

    .roi-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .roi-card {
      position: relative;
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 15px 14px 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--border));
      border-radius: 18px;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--accent) 10%, #ffffff), #ffffff 45%),
        var(--white);
      color: var(--navy);
      font: inherit;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .roi-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 13%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 29%),
        linear-gradient(180deg, transparent 46%, color-mix(in srgb, var(--accent) 8%, transparent));
      pointer-events: none;
      opacity: 0.88;
    }

    .roi-card:hover,
    .roi-card:focus-visible,
    .roi-card.is-active {
      outline: none;
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--accent) 58%, var(--border));
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.15);
    }

    .card-head,
    .metric-list,
    .impact-band {
      position: relative;
      z-index: 1;
    }

    .card-head {
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      gap: 10px;
    }

    .agent-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: var(--white);
      background: var(--accent);
      box-shadow: 0 12px 24px color-mix(in srgb, var(--accent) 28%, transparent);
      transition: transform 0.22s ease;
    }

    .roi-card:hover .agent-icon,
    .roi-card:focus-visible .agent-icon,
    .roi-card.is-active .agent-icon {
      transform: scale(1.07);
    }

    .agent-icon svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
      display: block;
    }

    .agent-name {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .metric-list {
      display: grid;
      align-content: stretch;
      gap: 8px;
      padding-top: 2px;
    }

    .metric-row {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 6px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(229, 231, 235, 0.78);
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.1;
    }

    .metric-value {
      color: var(--navy);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.1;
      text-align: right;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .metric-row.highlight {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .metric-row.highlight .metric-label,
    .metric-row.highlight .metric-value {
      color: var(--white);
    }

    .impact-band {
      min-height: 52px;
      display: flex;
      align-items: center;
      padding: 10px 11px;
      border-radius: 14px;
      color: var(--navy);
      background: color-mix(in srgb, var(--accent) 12%, #ffffff);
      border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
      font-size: 11px;
      font-weight: 600;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="blog-frame">
    <div class="canvas">
      <h1 class="page-title">How AI Agents Deliver ROI</h1>

      <section class="roi-grid" aria-label="AI agent ROI cards">
        <button class="roi-card is-active" type="button" aria-pressed="true" style="--accent: var(--orange);">
          <span class="card-head">
            <span class="agent-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 3a8 8 0 0 0-8 8v3a3 3 0 0 0 3 3h1a1 1 0 0 0 1-1v-5a1 1 0 0 0-1-1H6.08A6 6 0 0 1 18 10h-2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h1.35A5 5 0 0 1 13 20h-2a1 1 0 1 0 0 2h2a7 7 0 0 0 7-7v-4a8 8 0 0 0-8-8Z" /></svg>
            </span>
            <span class="agent-name">Support<br>Agent</span>
          </span>

          <span class="metric-list">
            <span class="metric-row"><span class="metric-label">Build Cost</span><span class="metric-value">$60k</span></span>
            <span class="metric-row"><span class="metric-label">Monthly Ops</span><span class="metric-value">$3k</span></span>
            <span class="metric-row"><span class="metric-label">Annual Savings</span><span class="metric-value">~$120k</span></span>
            <span class="metric-row highlight"><span class="metric-label">Break-Even</span><span class="metric-value">~8 months</span></span>
          </span>

          <span class="impact-band">Impact: 40% ticket deflection | 24/7 coverage</span>
        </button>

        <button class="roi-card" type="button" aria-pressed="false" style="--accent: var(--blue);">
          <span class="card-head">
            <span class="agent-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 19h16a1 1 0 1 1 0 2H4a1 1 0 1 1 0-2Zm2-3a1 1 0 0 1-1-1v-3a1 1 0 0 1 2 0v3a1 1 0 0 1-1 1Zm4 0a1 1 0 0 1-1-1V9a1 1 0 0 1 2 0v6a1 1 0 0 1-1 1Zm4 0a1 1 0 0 1-1-1V7a1 1 0 0 1 2 0v8a1 1 0 0 1-1 1Zm4 0a1 1 0 0 1-1-1V5a1 1 0 0 1 2 0v10a1 1 0 0 1-1 1ZM5 7.4a1 1 0 0 1 .38-1.36l4-2.25a1 1 0 0 1 1.1.07l3.18 2.39 3.73-3.72a1 1 0 0 1 1.41 1.41l-4.35 4.35a1 1 0 0 1-1.3.1L9.82 5.88 6.36 7.78A1 1 0 0 1 5 7.4Z" /></svg>
            </span>
            <span class="agent-name">Sales AI<br>Agent</span>
          </span>

          <span class="metric-list">
            <span class="metric-row"><span class="metric-label">Build Cost</span><span class="metric-value">$80k</span></span>
            <span class="metric-row"><span class="metric-label">Monthly Ops</span><span class="metric-value">$5k</span></span>
            <span class="metric-row"><span class="metric-label">Revenue Lift</span><span class="metric-value">+15% conversion rate</span></span>
            <span class="metric-row highlight"><span class="metric-label">Break-Even</span><span class="metric-value">10-14 months</span></span>
          </span>

          <span class="impact-band">Impact: 25% faster qualification | 15% higher conversion</span>
        </button>

        <button class="roi-card" type="button" aria-pressed="false" style="--accent: var(--green);">
          <span class="card-head">
            <span class="agent-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M8.5 11a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Zm7-1a3 3 0 1 1 0-6 3 3 0 0 1 0 6ZM2 18.5C2 15.46 4.69 13 8 13s6 2.46 6 5.5A1.5 1.5 0 0 1 12.5 20h-9A1.5 1.5 0 0 1 2 18.5Zm12.86-5.33A6.65 6.65 0 0 1 16 18.5c0 .53-.14 1.04-.4 1.5h4.9a1.5 1.5 0 0 0 1.5-1.5c0-2.76-2.46-5-5.5-5-.58 0-1.13.08-1.64.23Z" /></svg>
            </span>
            <span class="agent-name">HR Automation<br>Agent</span>
          </span>

          <span class="metric-list">
            <span class="metric-row"><span class="metric-label">Build Cost</span><span class="metric-value">$100k</span></span>
            <span class="metric-row"><span class="metric-label">Monthly Ops</span><span class="metric-value">$4k</span></span>
            <span class="metric-row"><span class="metric-label">Annual Savings</span><span class="metric-value">$150k</span></span>
            <span class="metric-row highlight"><span class="metric-label">Break-Even</span><span class="metric-value">~9 months</span></span>
          </span>

          <span class="impact-band">Impact: 60% less manual work | Instant policy answers</span>
        </button>
      </section>
    </div>
  </main>

  <script>
    const cards = document.querySelectorAll(".roi-card");

    cards.forEach((card) => {
      card.addEventListener("click", () => {
        cards.forEach((item) => {
          item.classList.toggle("is-active", item === card);
          item.setAttribute("aria-pressed", item === card ? "true" : "false");
        });
      });
    });
  </script>
</body>
</html>

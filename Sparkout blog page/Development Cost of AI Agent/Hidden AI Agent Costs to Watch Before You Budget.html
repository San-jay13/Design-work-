<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidden AI Agent Costs to Watch Before You Budget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --frame-width: 855px;
      --frame-height: 551px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --navy: #172640;
      --muted: #5f6f87;
      --border: #e5e7eb;
      --orange: #ff6c1a;
      --blue: #2377d6;
      --green: #15905e;
      --purple: #6d3dd2;
      --teal: #0f9aa5;
      --red: #e8504f;
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 14px 30px rgba(15, 23, 42, 0.09);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
      background: var(--page-bg);
      color: var(--navy);
      font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .blog-frame {
      width: var(--frame-width);
      height: var(--frame-height);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 108, 26, 0.055), transparent 27%),
        linear-gradient(135deg, rgba(255, 243, 236, 0.42), rgba(255, 255, 255, 0) 38%),
        var(--white);
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .blog-frame::after {
      content: "";
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(229, 231, 235, 0.95);
      border-radius: 16px;
      pointer-events: none;
      z-index: 4;
    }

    .canvas {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      padding: 34px 54px 42px;
    }

    .header {
      text-align: center;
    }

    .page-title {
      max-width: 760px;
      margin: 0 auto;
      color: var(--navy);
      font-size: 28px;
      font-weight: 700;
      line-height: 1.16;
      letter-spacing: 0;
    }

    .cost-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 13px;
    }

    .cost-tile {
      position: relative;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 16px 17px 15px;
      border: 1px solid rgba(229, 231, 235, 0.96);
      border-radius: 18px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 13%, #ffffff), #ffffff 42%),
        var(--white);
      color: var(--navy);
      font: inherit;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .cost-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 18%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 30%),
        radial-gradient(circle at 92% 12%, color-mix(in srgb, var(--accent) 24%, transparent), transparent 27%),
        linear-gradient(160deg, transparent 38%, color-mix(in srgb, var(--accent) 9%, transparent));
      opacity: 0.9;
      pointer-events: none;
    }

    .cost-tile::after {
      content: "";
      position: absolute;
      left: 17px;
      right: 17px;
      bottom: 14px;
      height: 5px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 26%, #e9eef5);
      pointer-events: none;
      transform-origin: left;
      transform: scaleX(0.34);
      transition: transform 0.22s ease, background 0.22s ease;
    }

    .cost-tile:hover,
    .cost-tile:focus-visible,
    .cost-tile.is-active {
      outline: none;
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--accent) 44%, var(--border));
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.14);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, #ffffff), #ffffff 48%),
        var(--white);
    }

    .cost-tile:hover::after,
    .cost-tile:focus-visible::after,
    .cost-tile.is-active::after {
      transform: scaleX(1);
      background: var(--accent);
    }

    .tile-top,
    .tile-title {
      position: relative;
      z-index: 1;
    }

    .tile-top {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
    }

    .tile-icon {
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 16px;
      background: var(--accent);
      color: var(--accent);
      color: var(--white);
      border: 1px solid color-mix(in srgb, var(--accent) 32%, #ffffff);
      transition: background 0.22s ease, color 0.22s ease, transform 0.22s ease;
    }

    .cost-tile:hover .tile-icon,
    .cost-tile:focus-visible .tile-icon,
    .cost-tile.is-active .tile-icon {
      transform: scale(1.06);
    }

    .tile-icon svg {
      width: 33px;
      height: 33px;
      fill: currentColor;
      display: block;
    }

    .tile-title {
      align-self: center;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.24;
      letter-spacing: 0;
      color: var(--navy);
      padding-bottom: 18px;
    }
  </style>
</head>
<body>
  <main class="blog-frame">
    <div class="canvas">
      <header class="header">
        <h1 class="page-title">Hidden AI Agent Costs to Watch Before You Budget</h1>
      </header>

      <section class="cost-grid" aria-label="Hidden AI agent cost items">
        <button class="cost-tile is-active" type="button" aria-pressed="true" style="--accent: var(--orange);">
          <span class="tile-top">
            <span class="tile-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 4a2 2 0 0 1 2-2h7.6a2 2 0 0 1 1.42.59l4.39 4.39A2 2 0 0 1 20 8.4V20a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4Zm9 0v5h5l-5-5ZM8 13a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2H8Zm0 4a1 1 0 1 0 0 2h5a1 1 0 1 0 0-2H8Z" /></svg>
            </span>
          </span>
          <span class="tile-title">Data labelling &amp; Preparation</span>
        </button>

        <button class="cost-tile" type="button" aria-pressed="false" style="--accent: var(--blue);">
          <span class="tile-top">
            <span class="tile-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4V2L7 6l5 4V6a6 6 0 0 1 5.18 9.02 1 1 0 0 0 1.72 1.02 7.98 7.98 0 0 0-1.25-9.69ZM6.82 8.98A1 1 0 0 0 5.1 7.96a7.98 7.98 0 0 0 1.25 9.69A7.95 7.95 0 0 0 12 20v2l5-4-5-4v4a6 6 0 0 1-5.18-9.02Z" /></svg>
            </span>
          </span>
          <span class="tile-title">Model Retraining &amp; Updates</span>
        </button>

        <button class="cost-tile" type="button" aria-pressed="false" style="--accent: var(--green);">
          <span class="tile-top">
            <span class="tile-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2Zm1 15.93V19a1 1 0 1 1-2 0v-1.07a4.38 4.38 0 0 1-2.15-.95 1 1 0 0 1 1.3-1.52 2.85 2.85 0 0 0 1.85.57c1.1 0 1.7-.38 1.7-1.08 0-.56-.32-.9-2.05-1.32-1.55-.38-3.24-1.05-3.24-3.16A3.05 3.05 0 0 1 11 7.48V6.4a1 1 0 1 1 2 0v1.04a4 4 0 0 1 1.82.76 1 1 0 1 1-1.22 1.58 2.33 2.33 0 0 0-1.52-.42c-1 0-1.61.39-1.61 1.02 0 .5.26.82 1.96 1.23 1.76.43 3.33 1.16 3.33 3.26A3.08 3.08 0 0 1 13 17.93Z" /></svg>
            </span>
          </span>
          <span class="tile-title">Token Overuse</span>
        </button>

        <button class="cost-tile" type="button" aria-pressed="false" style="--accent: var(--purple);">
          <span class="tile-top">
            <span class="tile-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M7 14a5 5 0 1 1 4.58-7H21a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-2v2a1 1 0 0 1-1 1h-3v2a1 1 0 0 1-1 1h-2.42A5 5 0 0 1 7 14Zm0-8a3 3 0 1 0 2.72 4.26 1 1 0 0 1 .91-.58H12v-2h-1.37a1 1 0 0 1-.91-.58A3 3 0 0 0 7 6Zm0 3a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z" /></svg>
            </span>
          </span>
          <span class="tile-title">API Licensing Fees</span>
        </button>

        <button class="cost-tile" type="button" aria-pressed="false" style="--accent: var(--teal);">
          <span class="tile-top">
            <span class="tile-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-5v2h2a1 1 0 1 1 0 2H7a1 1 0 1 1 0-2h2v-2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v10h16V6H4Zm4 7a1 1 0 0 1-.8-1.6l2-2.67a1 1 0 0 1 1.54-.08l1.45 1.45 2.01-3.36a1 1 0 0 1 1.6-.15l2 2.2a1 1 0 0 1-1.48 1.34l-1.09-1.2-1.95 3.25a1 1 0 0 1-1.56.2l-1.59-1.59-1.33 1.78A1 1 0 0 1 8 13Z" /></svg>
            </span>
          </span>
          <span class="tile-title">Monitoring &amp; Observability Tools</span>
        </button>

        <button class="cost-tile" type="button" aria-pressed="false" style="--accent: var(--red);">
          <span class="tile-top">
            <span class="tile-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 2.15a1 1 0 0 0-.46.11l-7 3.5A1 1 0 0 0 4 6.65v5.1c0 4.9 3.01 8.2 7.6 10.17a1 1 0 0 0 .8 0c4.59-1.97 7.6-5.27 7.6-10.17v-5.1a1 1 0 0 0-.55-.9l-7-3.5a1 1 0 0 0-.45-.1Zm4.03 7.58a1 1 0 0 1 0 1.42l-4.6 4.6a1 1 0 0 1-1.42 0l-2.04-2.04a1 1 0 1 1 1.42-1.42l1.33 1.34 3.89-3.9a1 1 0 0 1 1.42 0Z" /></svg>
            </span>
          </span>
          <span class="tile-title">Security Audits &amp; Compliance Reviews</span>
        </button>
      </section>
    </div>
  </main>

  <script>
    const tiles = document.querySelectorAll(".cost-tile");

    tiles.forEach((tile) => {
      tile.addEventListener("click", () => {
        tiles.forEach((item) => {
          item.classList.toggle("is-active", item === tile);
          item.setAttribute("aria-pressed", item === tile ? "true" : "false");
        });
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our AI Chatbot Services - We Fix All Common Chatbot Mistakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --frame-width: 855px;
      --frame-height: 610px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --navy: #172640;
      --muted: #617189;
      --border: #e2e8f0;
      --blue: #1769d1;
      --red: #df2d2d;
      --yellow: #f5be19;
      --green: #1d9560;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 32px 16px;
      background: var(--page-bg);
      color: var(--navy);
      font-family: "Montserrat", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .blog-frame {
      width: var(--frame-width);
      height: var(--frame-height);
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        radial-gradient(circle at 8% 10%, rgba(37, 111, 206, 0.045), transparent 27%),
        linear-gradient(135deg, rgba(239, 248, 255, 0.56), rgba(255, 255, 255, 0) 45%),
        var(--white);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }

    .blog-frame::after {
      content: "";
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 16px;
      pointer-events: none;
    }

    .canvas {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 17px;
      padding: 45px 48px 37px;
    }

    .page-title {
      max-width: 690px;
      margin: 0 auto;
      text-align: center;
      font-size: 27px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .cycle {
      position: relative;
      width: 650px;
      height: 410px;
      max-width: 100%;
      margin: auto;
    }

    .flow-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 310px;
      height: 310px;
      border: 2px dashed #d8e4ef;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ring-turn 16s linear infinite;
    }

    .flow-ring::before {
      content: "";
      position: absolute;
      inset: 17px;
      border: 1px solid rgba(37, 111, 206, 0.12);
      border-radius: inherit;
    }

    .center-mark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 126px;
      height: 126px;
      display: grid;
      place-items: center;
      border: 1px solid #dbe7f2;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 13px 28px rgba(15, 23, 42, 0.09);
      transform: translate(-50%, -50%);
    }

    .center-mark svg { width: 67px; height: 67px; fill: #ff6c1a; }

    .flow-arrow {
      position: absolute;
      z-index: 1;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid #dbe5ee;
      border-radius: 50%;
      background: var(--white);
      color: var(--blue);
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06);
      animation: arrow-pulse 2.2s ease-in-out infinite;
    }

    .flow-arrow svg { width: 17px; height: 17px; fill: currentColor; }
    .arrow-one { right: 20%; top: 20%; transform: rotate(45deg); color: var(--red); animation-delay: 0s; }
    .arrow-two { right: 20%; bottom: 20%; transform: rotate(135deg); color: var(--yellow); animation-delay: 0.55s; }
    .arrow-three { left: 20%; bottom: 20%; transform: rotate(225deg); color: var(--green); animation-delay: 1.1s; }
    .arrow-four { left: 20%; top: 20%; transform: rotate(315deg); color: var(--blue); animation-delay: 1.65s; }

    .stage {
      --accent: var(--blue);
      position: absolute;
      z-index: 2;
      width: 150px;
      min-height: 76px;
      display: grid;
      grid-template-columns: 41px minmax(0, 1fr);
      align-items: center;
      gap: 11px;
      padding: 12px 13px;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
      border-radius: 15px;
      background: #ffffff;
      color: var(--navy);
      font: inherit;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.07);
      opacity: 0;
      transform: scale(0.94);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, opacity 0.32s ease, background 0.25s ease;
    }

    .cycle.is-visible .stage { opacity: 1; transform: scale(1); }
    .cycle.is-visible .stage:nth-of-type(1) { transition-delay: 0.04s; }
    .cycle.is-visible .stage:nth-of-type(2) { transition-delay: 0.12s; }
    .cycle.is-visible .stage:nth-of-type(3) { transition-delay: 0.20s; }
    .cycle.is-visible .stage:nth-of-type(4) { transition-delay: 0.28s; }

    .stage:hover,
    .stage:focus-visible,
    .stage.is-active {
      outline: none;
      transform: scale(1.06);
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, white);
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.13);
    }

    .stage-icon {
      width: 41px;
      height: 41px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--accent);
      color: var(--icon-color, var(--white));
    }

    .stage-icon svg { width: 22px; height: 22px; fill: currentColor; }
    .stage-label { font-size: 15px; font-weight: 700; line-height: 1.15; letter-spacing: 0; }

    .stage-collect { left: 50%; top: 0; transform: translateX(-50%) scale(0.94); }
    .stage-analyze { right: 1%; top: 50%; transform: translateY(-50%) scale(0.94); }
    .stage-improve { left: 50%; bottom: 0; transform: translateX(-50%) scale(0.94); }
    .stage-measure { left: 1%; top: 50%; transform: translateY(-50%) scale(0.94); }
    .cycle.is-visible .stage-collect, .cycle.is-visible .stage-improve { transform: translateX(-50%) scale(1); }
    .cycle.is-visible .stage-analyze, .cycle.is-visible .stage-measure { transform: translateY(-50%) scale(1); }
    .stage-collect:hover, .stage-collect:focus-visible, .stage-collect.is-active,
    .stage-improve:hover, .stage-improve:focus-visible, .stage-improve.is-active { transform: translateX(-50%) scale(1.06); }
    .stage-analyze:hover, .stage-analyze:focus-visible, .stage-analyze.is-active,
    .stage-measure:hover, .stage-measure:focus-visible, .stage-measure.is-active { transform: translateY(-50%) scale(1.06); }

    @keyframes arrow-pulse {
      0%, 100% { opacity: 0.45; box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06); }
      45%, 62% { opacity: 1; box-shadow: 0 0 0 8px color-mix(in srgb, currentColor 17%, transparent), 0 10px 20px color-mix(in srgb, currentColor 24%, transparent); }
    }

    @keyframes ring-turn {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .stage, .flow-arrow, .flow-ring { animation: none; transition: none; opacity: 1; }
      .stage, .cycle.is-visible .stage-collect, .cycle.is-visible .stage-improve, .cycle.is-visible .stage-analyze, .cycle.is-visible .stage-measure { transform: none; }
      .stage-collect:hover, .stage-collect:focus-visible, .stage-collect.is-active,
      .stage-improve:hover, .stage-improve:focus-visible, .stage-improve.is-active,
      .stage-analyze:hover, .stage-analyze:focus-visible, .stage-analyze.is-active,
      .stage-measure:hover, .stage-measure:focus-visible, .stage-measure.is-active { transform: scale(1.04); }
    }
  </style>
</head>
<body>
  <main class="blog-frame">
    <div class="canvas">
      <h1 class="page-title">Our AI Chatbot Services - We Fix All Common Chatbot Mistakes</h1>

      <section class="cycle" aria-label="AI chatbot improvement cycle">
        <div class="flow-ring" aria-hidden="true"></div>
        <div class="center-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M7 4h10a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3h-3.7L8 21v-4H7a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Zm2 5a1.25 1.25 0 1 0 0 2.5A1.25 1.25 0 0 0 9 9Zm6 0a1.25 1.25 0 1 0 0 2.5A1.25 1.25 0 0 0 15 9Zm-4 5a1 1 0 1 0 2 0h-2Z" /></svg>
        </div>

        <span class="flow-arrow arrow-one" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m13 5-1.41 1.41L16.17 11H4v2h12.17l-4.58 4.59L13 19l7-7-7-7Z" /></svg></span>
        <span class="flow-arrow arrow-two" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m13 5-1.41 1.41L16.17 11H4v2h12.17l-4.58 4.59L13 19l7-7-7-7Z" /></svg></span>
        <span class="flow-arrow arrow-three" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m13 5-1.41 1.41L16.17 11H4v2h12.17l-4.58 4.59L13 19l7-7-7-7Z" /></svg></span>
        <span class="flow-arrow arrow-four" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m13 5-1.41 1.41L16.17 11H4v2h12.17l-4.58 4.59L13 19l7-7-7-7Z" /></svg></span>

        <button class="stage stage-collect is-active" type="button" aria-pressed="true" style="--accent: var(--blue);">
          <span class="stage-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v4a1 1 0 0 0 2 0V5h14v14H5v-4a1 1 0 0 0-2 0v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2Zm-7 5-5 5 1.41 1.41L11 11.83V17h2v-5.17l2.59 2.58L17 13l-5-5Z" /></svg></span>
          <span class="stage-label">Collect</span>
        </button>

        <button class="stage stage-analyze" type="button" aria-pressed="false" style="--accent: var(--red);">
          <span class="stage-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10.5 3a7.5 7.5 0 1 0 4.71 13.34L20.44 21l1.41-1.42-5.03-5.03A7.5 7.5 0 0 0 10.5 3Zm0 2a5.5 5.5 0 1 1-5.5 5.5A5.51 5.51 0 0 1 10.5 5Z" /></svg></span>
          <span class="stage-label">Analyze</span>
        </button>

        <button class="stage stage-improve" type="button" aria-pressed="false" style="--accent: var(--yellow); --icon-color: var(--navy);">
          <span class="stage-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M21.02 6.2a5.22 5.22 0 0 1-6.78 4.98l-7.1 7.1a2.23 2.23 0 0 1-3.15-3.15l7.1-7.1a5.22 5.22 0 0 1 4.98-6.78l-2.33 2.33.3 2.08 2.08.3 2.33-2.33c.24.85.25 1.75.03 2.57Zm-2.2 7.69 1.59 1.59a2.23 2.23 0 0 1-3.15 3.15l-1.59-1.59 1.41-1.41.88.88a.23.23 0 0 0 .32-.32l-.88-.88 1.42-1.42Z" /></svg></span>
          <span class="stage-label">Improve</span>
        </button>

        <button class="stage stage-measure" type="button" aria-pressed="false" style="--accent: var(--green);">
          <span class="stage-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 19h14v2H3V3h2v16Zm3-3H6v-5h2v5Zm5 0h-2V7h2v9Zm5 0h-2V4h2v12Z" /></svg></span>
          <span class="stage-label">Measure</span>
        </button>

      </section>
    </div>
  </main>

  <script>
    const cycle = document.querySelector(".cycle");
    const stages = document.querySelectorAll(".stage");
    requestAnimationFrame(() => cycle.classList.add("is-visible"));

    stages.forEach((stage) => {
      stage.addEventListener("click", () => {
        stages.forEach((item) => {
          const selected = item === stage;
          item.classList.toggle("is-active", selected);
          item.setAttribute("aria-pressed", selected ? "true" : "false");
        });
      });
    });
  </script>
</body>
</html>

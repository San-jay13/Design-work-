<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Role-Based Adoption Paths - Why Generic Onboarding Fails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --content-width: 915px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --font: #0b1220;
      --navy: #192a44;
      --muted: #6b7280;
      --border: #e5e7eb;
      --orange: #ff6c1a;
      --orange-deep: #ff4d0d;
      --soft-orange: #fff4ec;
      --blue: #2563eb;
      --soft-blue: #eff6ff;
      --green: #14885f;
      --soft-green: #ecfdf5;
      --purple: #6d3dd2;
      --soft-purple: #f5f3ff;
      --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      background:
        linear-gradient(90deg, rgba(255, 108, 26, 0.045) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(25, 42, 68, 0.04) 0 1px, transparent 1px 100%),
        var(--page-bg);
      background-size: 42px 42px;
      color: var(--font);
      font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .role-section {
      width: min(100%, var(--content-width));
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 108, 26, 0.09), transparent 26%),
        linear-gradient(135deg, rgba(255, 244, 236, 0.68), rgba(255, 255, 255, 0.9) 46%, rgba(248, 250, 252, 0.94)),
        var(--white);
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .role-section::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(229, 231, 235, 0.92);
      border-radius: 16px;
      pointer-events: none;
      z-index: 1;
    }

    .role-section::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(100, 116, 139, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 116, 139, 0.07) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent 82%);
      z-index: -1;
    }

    .role-canvas {
      position: relative;
      z-index: 2;
      padding: 52px;
    }

    .title {
      max-width: 760px;
      margin: 0 auto;
      color: var(--navy);
      font-size: 30px;
      font-weight: 800;
      line-height: 1.22;
      letter-spacing: 0;
      text-align: center;
    }

    .pathway-shell {
      display: grid;
      grid-template-columns: 245px minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
      margin-top: 26px;
    }

    .role-picker,
    .pathway-board {
      overflow: hidden;
      border: 1px solid rgba(229, 231, 235, 0.98);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-lg);
    }

    .role-picker {
      display: grid;
      gap: 8px;
      align-content: start;
      padding: 14px;
    }

    .role-button {
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--navy);
      font: inherit;
      text-align: left;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .role-button:hover,
    .role-button:focus-visible {
      outline: none;
      transform: translateX(3px);
      border-color: color-mix(in srgb, var(--accent) 34%, var(--border));
    }

    .role-button.is-active {
      border-color: color-mix(in srgb, var(--accent) 34%, var(--border));
      background: color-mix(in srgb, var(--soft) 72%, #ffffff);
      box-shadow: 0 12px 24px color-mix(in srgb, var(--accent) 14%, transparent);
    }

    .role-dot {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      color: var(--accent);
      background: var(--soft);
    }

    .role-dot svg,
    .role-avatar svg,
    .station-icon svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .role-button.is-active .role-dot {
      color: var(--white);
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 74%, var(--navy)));
    }

    .role-button strong {
      min-width: 0;
      color: var(--navy);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .pathway-board {
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--white);
    }

    .board-header {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 14px;
      align-items: center;
      padding: 22px;
      border-bottom: 1px solid var(--border);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--active-soft) 76%, #ffffff), #ffffff);
    }

    .role-avatar {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      color: var(--white);
      background: linear-gradient(135deg, var(--active-accent), color-mix(in srgb, var(--active-accent) 72%, var(--navy)));
      box-shadow: 0 16px 30px color-mix(in srgb, var(--active-accent) 22%, transparent);
    }

    .role-avatar svg {
      width: 30px;
      height: 30px;
      stroke-width: 1.8;
    }

    .board-header strong {
      display: block;
      color: var(--navy);
      font-size: 23px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .board-header span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.55;
    }

    .pathway {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.72), rgba(255, 255, 255, 0.96)),
        var(--white);
    }

    .pathway::before {
      content: "";
      position: absolute;
      left: 92px;
      right: 92px;
      top: 86px;
      height: 2px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--active-accent) 26%, #dbe4ef);
    }

    .moving-pulse {
      position: absolute;
      top: 80px;
      left: 86px;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--active-accent);
      box-shadow: 0 0 0 7px color-mix(in srgb, var(--active-accent) 14%, transparent), 0 0 24px color-mix(in srgb, var(--active-accent) 30%, transparent);
      animation: pulseMove 3s ease-in-out infinite;
      z-index: 3;
    }

    .station {
      position: relative;
      z-index: 2;
      display: grid;
      align-content: start;
      gap: 12px;
      min-height: 240px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--white);
      box-shadow: var(--shadow-sm);
      opacity: 0;
      transform: translateY(12px);
      animation: reveal 0.42s ease forwards;
    }

    .station:nth-child(3) {
      animation-delay: 0.12s;
    }

    .station:nth-child(4) {
      animation-delay: 0.24s;
    }

    .station-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-md);
      color: var(--white);
      background: var(--active-accent);
      box-shadow: 0 12px 24px color-mix(in srgb, var(--active-accent) 20%, transparent);
    }

    .station b {
      color: var(--active-accent);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .station span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.65;
    }

    @keyframes pulseMove {
      0%, 100% {
        left: 86px;
      }
      50% {
        left: calc(100% - 100px);
      }
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 26px 14px;
      }

      .role-canvas {
        padding: 38px 30px;
      }

      .pathway-shell,
      .pathway {
        grid-template-columns: 1fr;
      }

      .pathway::before,
      .moving-pulse {
        display: none;
      }

      .station {
        min-height: 0;
      }
    }

    @media (max-width: 560px) {
      .role-section::before {
        inset: 14px;
      }

      .role-canvas {
        padding: 28px 20px;
      }

      .title {
        font-size: 24px;
      }

      .board-header {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="role-section" aria-label="Role based adoption paths">
    <div class="role-canvas">
      <h1 class="title">Role-Based Adoption Paths - Why Generic Onboarding Fails</h1>

      <section class="pathway-shell">
        <div class="role-picker" id="rolePicker" aria-label="Choose role"></div>

        <article class="pathway-board" aria-live="polite">
          <header class="board-header" id="boardHeader"></header>
          <div class="pathway" id="pathway"></div>
        </article>
      </section>
    </div>
  </main>

  <script>
    const icons = {
      frontline: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5a8 8 0 0 1 16 0"/><circle cx="12" cy="7" r="3.5"/><path d="M3 12h3M18 12h3"/></svg>`,
      manager: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V8h16v12"/><path d="M8 8V4h8v4M8 14h2M14 14h2M8 17h2M14 17h2"/></svg>`,
      admin: `<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h.01M11 8h6M7 12h.01M11 12h6M7 16h.01M11 16h6"/></svg>`,
      newHire: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H12v17H6.5A2.5 2.5 0 0 0 4 22.5zM20 5.5A2.5 2.5 0 0 0 17.5 3H12v17h5.5a2.5 2.5 0 0 1 2.5 2.5z"/></svg>`,
      leadership: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16M6 17V10M12 17V5M18 17v-8"/><path d="m4 10 4-4 4 2 6-5"/></svg>`,
      needs: `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="m12 12 6-6"/></svg>`,
      training: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H12v17H6.5A2.5 2.5 0 0 0 4 22.5zM20 5.5A2.5 2.5 0 0 0 17.5 3H12v17h5.5a2.5 2.5 0 0 1 2.5 2.5z"/></svg>`,
      metric: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>`
    };

    const roles = [
      {
        role: "Frontline users",
        icon: icons.frontline,
        needs: "Complete daily tasks quickly, minimal workflow interruption",
        training: "In-app walkthroughs; short task videos; in-the-flow prompts",
        metric: "Task completion rate and TTV",
        accent: "var(--orange)",
        soft: "var(--soft-orange)"
      },
      {
        role: "Managers",
        icon: icons.manager,
        needs: "Reporting, team oversight, approvals, coaching team usage",
        training: "Dashboard walkthroughs; report-generation tutorials; live sessions",
        metric: "Feature adoption and team WAU",
        accent: "var(--blue)",
        soft: "var(--soft-blue)"
      },
      {
        role: "IT & admins",
        icon: icons.admin,
        needs: "Configuration, permissions, integrations, security, logging",
        training: "Technical documentation; vendor sandbox; dedicated admin training",
        metric: "Integration uptime and error rate",
        accent: "var(--green)",
        soft: "var(--soft-green)"
      },
      {
        role: "New hires",
        icon: icons.newHire,
        needs: "Learn the tool alongside learning the company, role, and processes",
        training: "Structured 30-day onboarding path built into the tool itself",
        metric: "TTV and day-30 retention",
        accent: "var(--purple)",
        soft: "var(--soft-purple)"
      },
      {
        role: "Senior leadership",
        icon: icons.leadership,
        needs: "Strategic dashboards, ROI visibility, exception reporting",
        training: "Executive briefings; 1-page scorecards; short demo of relevant views",
        metric: "Adoption progress vs. plan",
        accent: "var(--orange)",
        soft: "var(--soft-orange)"
      }
    ];

    const rolePicker = document.getElementById("rolePicker");
    const boardHeader = document.getElementById("boardHeader");
    const pathway = document.getElementById("pathway");

    function setRole(index) {
      const item = roles[index];
      document.documentElement.style.setProperty("--active-accent", item.accent);
      document.documentElement.style.setProperty("--active-soft", item.soft);

      Array.from(rolePicker.children).forEach((button, buttonIndex) => {
        const active = buttonIndex === index;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });

      boardHeader.innerHTML = `
        <div class="role-avatar" aria-hidden="true">${item.icon}</div>
        <div>
          <strong>${item.role}</strong>
          <span>Role-specific adoption path</span>
        </div>
      `;

      pathway.innerHTML = `
        <div class="moving-pulse" aria-hidden="true"></div>
        <div class="station">
          <div class="station-icon" aria-hidden="true">${icons.needs}</div>
          <b>Primary needs</b>
          <span>${item.needs}</span>
        </div>
        <div class="station">
          <div class="station-icon" aria-hidden="true">${icons.training}</div>
          <b>Best training format</b>
          <span>${item.training}</span>
        </div>
        <div class="station">
          <div class="station-icon" aria-hidden="true">${icons.metric}</div>
          <b>Key metric</b>
          <span>${item.metric}</span>
        </div>
      `;
    }

    roles.forEach((item, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "role-button";
      button.style.setProperty("--accent", item.accent);
      button.style.setProperty("--soft", item.soft);
      button.setAttribute("aria-pressed", "false");
      button.innerHTML = `<span class="role-dot" aria-hidden="true">${item.icon}</span><strong>${item.role}</strong>`;
      button.addEventListener("click", () => setRole(index));
      rolePicker.appendChild(button);
    });

    setRole(0);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technology Adoption vs Digital Transformation vs Digital Adoption</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --content-width: 915px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --font: #0b1220;
      --navy: #192a44;
      --muted: #6b7280;
      --border: #e5e7eb;
      --orange: #ff6c1a;
      --orange-deep: #ff4d0d;
      --soft-orange: #fff4ec;
      --blue: #2563eb;
      --soft-blue: #eff6ff;
      --green: #14885f;
      --soft-green: #ecfdf5;
      --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      background:
        linear-gradient(90deg, rgba(255, 108, 26, 0.045) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(25, 42, 68, 0.04) 0 1px, transparent 1px 100%),
        var(--page-bg);
      background-size: 42px 42px;
      color: var(--font);
      font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .decision-section {
      width: min(100%, var(--content-width));
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 108, 26, 0.09), transparent 26%),
        linear-gradient(135deg, rgba(255, 244, 236, 0.68), rgba(255, 255, 255, 0.9) 46%, rgba(248, 250, 252, 0.94)),
        var(--white);
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .decision-section::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(229, 231, 235, 0.92);
      border-radius: 16px;
      pointer-events: none;
      z-index: 1;
    }

    .decision-section::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(100, 116, 139, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 116, 139, 0.07) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent 82%);
      z-index: -1;
    }

    .decision-canvas {
      position: relative;
      z-index: 2;
      padding: 52px;
    }

    .title {
      max-width: 780px;
      margin: 0 auto;
      color: var(--navy);
      font-size: 30px;
      font-weight: 800;
      line-height: 1.22;
      letter-spacing: 0;
      text-align: center;
    }

    .goal-picker {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 24px;
    }

    .goal-button {
      min-height: 138px;
      display: grid;
      align-content: center;
      gap: 12px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.92);
      color: var(--navy);
      font: inherit;
      text-align: left;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .goal-button:hover,
    .goal-button:focus-visible {
      outline: none;
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--accent) 34%, var(--border));
      box-shadow: var(--shadow-md);
    }

    .goal-button.is-active {
      border-color: color-mix(in srgb, var(--accent) 42%, var(--border));
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--soft) 74%, #ffffff), #ffffff 72%),
        var(--white);
      box-shadow: 0 16px 34px color-mix(in srgb, var(--accent) 16%, transparent);
    }

    .goal-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-md);
      color: var(--accent);
      background: var(--soft);
      border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
      line-height: 0;
    }

    .goal-icon svg {
      width: 21px;
      height: 21px;
      display: block;
      stroke-width: 2.2;
    }

    .goal-button strong {
      color: var(--navy);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .decision-output {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 18px;
      align-items: stretch;
      margin-top: 18px;
      overflow: hidden;
      border: 1px solid rgba(229, 231, 235, 0.98);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-lg);
    }

    .selected-card {
      display: grid;
      align-content: center;
      gap: 16px;
      padding: 24px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--active-soft) 78%, #ffffff), #ffffff);
      border-right: 1px solid var(--border);
    }

    .image-layout {
      position: relative;
      min-height: 126px;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--active-accent) 22%, var(--border));
      border-radius: var(--radius-lg);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--active-soft) 88%, #ffffff), #ffffff),
        var(--white);
      box-shadow: var(--shadow-sm);
      isolation: isolate;
    }

    .image-layout::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: var(--radius-md);
      background-image:
        linear-gradient(color-mix(in srgb, var(--active-accent) 12%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in srgb, var(--active-accent) 12%, transparent) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: 0.85;
      z-index: -1;
    }

    .image-layout::after {
      content: "";
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--active-accent), color-mix(in srgb, var(--active-accent) 70%, var(--navy)));
      box-shadow: 0 16px 28px color-mix(in srgb, var(--active-accent) 20%, transparent);
    }

    .image-screen {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 108px;
      height: 74px;
      border: 1px solid rgba(229, 231, 235, 0.96);
      border-radius: var(--radius-md);
      background: var(--white);
      box-shadow: var(--shadow-md);
    }

    .image-screen span {
      position: absolute;
      left: 14px;
      right: 14px;
      height: 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--active-accent) 24%, #e5e7eb);
    }

    .image-screen span:nth-child(1) {
      top: 16px;
      width: 58%;
    }

    .image-screen span:nth-child(2) {
      top: 34px;
      width: 76%;
    }

    .image-screen span:nth-child(3) {
      top: 52px;
      width: 44%;
    }

    .image-badge {
      position: absolute;
      left: 46px;
      bottom: 18px;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      color: var(--white);
      background: var(--active-accent);
      box-shadow: 0 12px 24px color-mix(in srgb, var(--active-accent) 24%, transparent);
      line-height: 0;
    }

    .image-badge svg {
      width: 21px;
      height: 21px;
      display: block;
      stroke-width: 2.2;
    }

    .selected-card strong {
      color: var(--navy);
      font-size: 21px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .answer-list {
      display: grid;
      gap: 12px;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.72), rgba(255, 255, 255, 0.96)),
        var(--white);
    }

    .answer-row {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: center;
      min-height: 70px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--white);
      box-shadow: var(--shadow-sm);
      opacity: 0;
      transform: translateY(12px);
      animation: reveal 0.42s ease forwards;
    }

    .answer-row:nth-child(2) {
      animation-delay: 0.1s;
    }

    .answer-row:nth-child(3) {
      animation-delay: 0.2s;
    }

    .row-number {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: var(--white);
      background: var(--active-accent);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .answer-row span:last-child {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.55;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 26px 14px;
      }

      .decision-canvas {
        padding: 38px 30px;
      }

      .goal-picker,
      .decision-output {
        grid-template-columns: 1fr;
      }

      .selected-card {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
    }

    @media (max-width: 560px) {
      .decision-section::before {
        inset: 14px;
      }

      .decision-canvas {
        padding: 28px 20px;
      }

      .title {
        font-size: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="decision-section" aria-label="Technology adoption decision flow">
    <div class="decision-canvas">
      <h1 class="title">Technology Adoption vs Digital Transformation vs Digital Adoption</h1>

      <section class="goal-picker" aria-label="Choose a business goal">
        <button class="goal-button is-active" type="button" data-index="0" style="--accent: var(--orange); --soft: var(--soft-orange);" aria-pressed="true">
          <span class="goal-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>
          </span>
          <strong>Technology Adoption</strong>
        </button>

        <button class="goal-button" type="button" data-index="1" style="--accent: var(--blue); --soft: var(--soft-blue);" aria-pressed="false">
          <span class="goal-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect width="16" height="12" x="4" y="6" rx="2" /><path d="M8 18h8M9 10h6M9 14h3" /></svg>
          </span>
          <strong>Digital Adoption</strong>
        </button>

        <button class="goal-button" type="button" data-index="2" style="--accent: var(--green); --soft: var(--soft-green);" aria-pressed="false">
          <span class="goal-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h6l3-8 3 16 3-8h3" /><path d="M5 20h14" /></svg>
          </span>
          <strong>Digital Transformation</strong>
        </button>
      </section>

      <section class="decision-output" aria-live="polite">
        <div class="selected-card" id="selectedCard"></div>
        <div class="answer-list" id="answerList"></div>
      </section>
    </div>
  </main>

  <script>
    const data = [
      {
        title: "Technology Adoption",
        accent: "var(--orange)",
        soft: "var(--soft-orange)",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>`,
        rows: [
          "Ensures new technologies are successfully used",
          "Focuses on people, processes, & technology",
          "Measures adoption, utilization, & ROI"
        ]
      },
      {
        title: "Digital Adoption",
        accent: "var(--blue)",
        soft: "var(--soft-blue)",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect width="16" height="12" x="4" y="6" rx="2" /><path d="M8 18h8M9 10h6M9 14h3" /></svg>`,
        rows: [
          "Helps users effectively use digital tools",
          "Focuses on user enablement & software usage",
          "Measures engagement & feature usage"
        ]
      },
      {
        title: "Digital Transformation",
        accent: "var(--green)",
        soft: "var(--soft-green)",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h6l3-8 3 16 3-8h3" /><path d="M5 20h14" /></svg>`,
        rows: [
          "Transforms how the business operates",
          "Focuses on organization-wide change",
          "Measures business outcomes & growth"
        ]
      }
    ];

    const buttons = Array.from(document.querySelectorAll(".goal-button"));
    const selectedCard = document.getElementById("selectedCard");
    const answerList = document.getElementById("answerList");

    function setActive(index) {
      const item = data[index];
      document.documentElement.style.setProperty("--active-accent", item.accent);
      document.documentElement.style.setProperty("--active-soft", item.soft);

      buttons.forEach((button, buttonIndex) => {
        const active = buttonIndex === index;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });

      selectedCard.innerHTML = `
        <div class="image-layout" aria-hidden="true">
          <div class="image-screen">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="image-badge">${item.icon}</div>
        </div>
        <strong>${item.title}</strong>
      `;

      answerList.innerHTML = item.rows.map((row, rowIndex) => `
        <div class="answer-row">
          <span class="row-number">${rowIndex + 1}</span>
          <span>${row}</span>
        </div>
      `).join("");
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => setActive(Number(button.dataset.index)));
    });

    setActive(0);
  </script>
</body>
</html>

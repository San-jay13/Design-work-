<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Complete Technology Adoption for Enterprise Rollouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --navy:#172640; --muted:#63738b; --border:#e2e8f0; --page:#f7f9fc; --orange:#ff6c1a; --blue:#2479d3; --green:#16865a; --violet:#6d4ac3; }

    body { min-height:100vh; padding:28px 16px; background:var(--page); color:var(--navy); font-family:"Montserrat",ui-sans-serif,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }

    .checklist-page { width:min(100%,880px); position:relative; margin:0 auto; padding:34px; overflow:hidden; border:1px solid var(--border); border-radius:18px; background:linear-gradient(145deg,rgba(255,246,240,.46),rgba(255,255,255,0) 34%),#fff; box-shadow:0 18px 42px rgba(15,23,42,.08); isolation:isolate; }
    .checklist-page::after { content:""; position:absolute; inset:17px; border:1px solid rgba(226,232,240,.92); border-radius:13px; pointer-events:none; z-index:3; }
    .checklist-stack { position:relative; z-index:1; display:grid; gap:11px; }
    .page-title { margin:0 0 22px; color:var(--navy); font-size:26px; font-weight:800; line-height:1.18; letter-spacing:0; text-align:center; }

    .check-section { --accent:var(--orange); overflow:hidden; border:1px solid color-mix(in srgb,var(--accent) 24%,var(--border)); border-radius:14px; background:#fff; box-shadow:0 7px 16px rgba(15,23,42,.045); transition:box-shadow .2s ease,transform .2s ease; }
    .check-section[open] { box-shadow:0 13px 25px rgba(15,23,42,.09); }
    .pre-launch { --accent:var(--orange); } .launch { --accent:var(--blue); } .post-launch { --accent:var(--green); } .ready { --accent:var(--violet); }

    summary { display:grid; grid-template-columns:42px minmax(0,1fr) 24px; align-items:center; gap:12px; min-height:68px; padding:12px 15px; list-style:none; cursor:pointer; background:color-mix(in srgb,var(--accent) 7%,#fff); }
    summary::-webkit-details-marker { display:none; }
    summary:hover { background:color-mix(in srgb,var(--accent) 11%,#fff); }
    summary:focus-visible { outline:2px solid var(--accent); outline-offset:-3px; }

    .section-icon { width:42px; height:42px; display:grid; place-items:center; border-radius:12px; color:#fff; background:var(--accent); }
    .section-icon svg { width:22px; height:22px; fill:currentColor; }
    .section-title { color:var(--navy); font-size:16px; font-weight:800; line-height:1.25; }
    .chevron { width:10px; height:10px; border-right:2px solid var(--accent); border-bottom:2px solid var(--accent); transform:rotate(45deg) translateY(-3px); transition:transform .2s ease; }
    .check-section[open] .chevron { transform:rotate(225deg) translate(-2px,-1px); }

    .section-content { padding:0 15px 15px; border-top:1px solid color-mix(in srgb,var(--accent) 15%,var(--border)); }
    .ready-copy { padding:13px 0 9px; color:var(--muted); font-size:11px; font-weight:600; line-height:1.5; }
    .checks { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); border:1px solid #edf1f5; border-radius:10px; overflow:hidden; }

    .check-row { display:grid; grid-template-columns:9px minmax(0,1fr); align-items:center; gap:10px; min-height:50px; padding:10px 12px; color:var(--navy); font-size:10px; font-weight:600; line-height:1.38; border-bottom:1px solid #edf1f5; transition:background .18s ease,color .18s ease; }
    .check-row:nth-child(odd) { border-right:1px solid #edf1f5; }
    .check-row:nth-last-child(-n + 2) { border-bottom:0; }
    .check-row:hover { background:color-mix(in srgb,var(--accent) 5%,#fff); }
    .check-row::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--accent); }

    .check-row input { display:none; }

    @media (max-width:620px) { body { padding:16px 10px; } .checklist-page { padding:24px 17px; } .checks { grid-template-columns:1fr; } .check-row:nth-child(odd) { border-right:0; } .check-row:nth-last-child(2) { border-bottom:1px solid #edf1f5; } .section-title { font-size:14px; } }
  </style>
</head>
<body>
  <main class="checklist-page">
    <div class="checklist-stack">
      <h1 class="page-title">The Complete Technology Adoption<br>for Enterprise Rollouts</h1>
      <details class="check-section pre-launch" open>
        <summary><span class="section-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 4.24 12.57L16 19a3 3 0 0 1-3 3h-2a3 3 0 0 1-3-3l-.24-4.43A7 7 0 0 1 12 2Zm-2 17a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-1h-4v1Zm2-15a5 5 0 0 0-2.82 9.13 1 1 0 0 1 .45.83L9.77 16h4.46l.14-2.04a1 1 0 0 1 .45-.83A5 5 0 0 0 12 4Z" /></svg></span><h3 class="section-title">Pre-Launch</h3><span class="chevron" aria-hidden="true"></span></summary>
        <div class="section-content"><div class="checks">
          <label class="check-row"><input type="checkbox" /><span>Digital readiness assessment completed</span></label><label class="check-row"><input type="checkbox" /><span>Clear strategy with defined KPIs</span></label>
          <label class="check-row"><input type="checkbox" /><span>Infrastructure audit completed</span></label><label class="check-row"><input type="checkbox" /><span>Tool selected based on usability (not just features)</span></label>
          <label class="check-row"><input type="checkbox" /><span>Data audit and migration plan in place</span></label><label class="check-row"><input type="checkbox" /><span>Security and compliance approved</span></label>
          <label class="check-row"><input type="checkbox" /><span>Adoption champions assigned</span></label><label class="check-row"><input type="checkbox" /><span>Role-based onboarding designed</span></label>
          <label class="check-row"><input type="checkbox" /><span>Sandbox or test environment ready</span></label><label class="check-row"><input type="checkbox" /><span>Communication plan prepared</span></label>
          <label class="check-row"><input type="checkbox" /><span>Adoption KPIs defined with baseline metrics</span></label><label class="check-row"><input type="checkbox" /><span>Adoption dashboard set up</span></label>
        </div></div>
      </details>

      <details class="check-section launch">
        <summary><span class="section-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3.5 12.5 20 4l-4.3 16-4.13-5.04L7 17.7l2.7-4.57L3.5 12.5Zm5.06-.23 4.2.9 1.78 2.17 2.22-8.26-8.2 4.19Z" /></svg></span><h2 class="section-title">Launch Week</h2><span class="chevron" aria-hidden="true"></span></summary>
        <div class="section-content"><div class="checks">
          <label class="check-row"><input type="checkbox" /><span>Announcement delivered (team-level or all-hands)</span></label><label class="check-row"><input type="checkbox" /><span>Role-based onboarding sessions completed</span></label>
          <label class="check-row"><input type="checkbox" /><span>In-app guidance activated</span></label><label class="check-row"><input type="checkbox" /><span>Change champions actively supporting teams</span></label>
          <label class="check-row"><input type="checkbox" /><span>Support tickets monitored daily</span></label><label class="check-row"><input type="checkbox" /><span>Week-1 feedback survey scheduled</span></label>
          <label class="check-row"><input type="checkbox" /><span>Leadership actively using and promoting the tool</span></label>
        </div></div>
      </details>

      <details class="check-section post-launch">
        <summary><span class="section-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 19h14v2H3V3h2v16Zm3-3H6v-5h2v5Zm5 0h-2V7h2v9Zm5 0h-2V4h2v12Z" /></svg></span><h2 class="section-title">Post-Launch (Weeks 2–12)</h2><span class="chevron" aria-hidden="true"></span></summary>
        <div class="section-content"><div class="checks">
          <label class="check-row"><input type="checkbox" /><span>Week-1 feedback reviewed and issues addressed</span></label><label class="check-row"><input type="checkbox" /><span>Weekly KPI reviews in place</span></label>
          <label class="check-row"><input type="checkbox" /><span>Champion office hours running</span></label><label class="check-row"><input type="checkbox" /><span>Knowledge base updated with real FAQs</span></label>
          <label class="check-row"><input type="checkbox" /><span>Week-4 feedback survey completed</span></label><label class="check-row"><input type="checkbox" /><span>Advanced feature adoption initiated (around week 6)</span></label>
          <label class="check-row"><input type="checkbox" /><span>Legacy tools being phased out</span></label><label class="check-row"><input type="checkbox" /><span>30-day adoption results shared with leadership</span></label>
          <label class="check-row"><input type="checkbox" /><span>90-day optimization plan defined</span></label>
        </div></div>
      </details>

      <details class="check-section ready">
        <summary><span class="section-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2.15a1 1 0 0 0-.46.11l-7 3.5A1 1 0 0 0 4 6.65v5.1c0 4.9 3.01 8.2 7.6 10.17a1 1 0 0 0 .8 0c4.59-1.97 7.6-5.27 7.6-10.17v-5.1a1 1 0 0 0-.55-.9l-7-3.5a1 1 0 0 0-.45-.1Zm4.03 7.58a1 1 0 0 1 0 1.42l-4.6 4.6a1 1 0 0 1-1.42 0l-2.04-2.04a1 1 0 1 1 1.42-1.42l1.33 1.34 3.89-3.9a1 1 0 0 1 1.42 0Z" /></svg></span><h2 class="section-title">Are You Ready for Successful Adoption?</h2><span class="chevron" aria-hidden="true"></span></summary>
        <div class="section-content"><p class="ready-copy">Your organization is ready for smooth, scalable adoption if you have:</p><div class="checks">
          <label class="check-row"><input type="checkbox" /><span>A clear &amp; measurable strategy</span></label><label class="check-row"><input type="checkbox" /><span>Completed readiness assessment</span></label>
          <label class="check-row"><input type="checkbox" /><span>Modern, scalable infrastructure</span></label><label class="check-row"><input type="checkbox" /><span>Role-based onboarding approach</span></label>
          <label class="check-row"><input type="checkbox" /><span>Strong leadership alignment</span></label><label class="check-row"><input type="checkbox" /><span>Updated business processes</span></label>
          <label class="check-row"><input type="checkbox" /><span>Defined KPIs with tracking</span></label><label class="check-row"><input type="checkbox" /><span>Change champions in place</span></label>
        </div></div>
      </details>
    </div>
  </main>

  <script>
    const sections = [...document.querySelectorAll('.check-section')];
    sections.forEach((section) => section.addEventListener('toggle', () => {
      if (section.open) sections.forEach((other) => { if (other !== section) other.open = false; });
    }));
  </script>
</body>
</html>

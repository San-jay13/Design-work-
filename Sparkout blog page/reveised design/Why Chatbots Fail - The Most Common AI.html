<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Know Why AI Chatbots Fail & Impact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --frame-width: 855px;
      --frame-height: 610px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --navy: #172640;
      --muted: #607088;
      --border: #e4e8ef;
      --orange: #ff6c1a;
      --blue: #2178d4;
      --green: #15905e;
      --purple: #6d3dd2;
      --teal: #0f9aa5;
      --red: #e8504f;
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
      --shadow-sm: 0 8px 18px rgba(15, 23, 42, 0.06);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
      background: var(--page-bg);
      color: var(--navy);
      font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .blog-frame {
      width: var(--frame-width);
      height: var(--frame-height);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        radial-gradient(circle at 9% 8%, rgba(255, 108, 26, 0.045), transparent 28%),
        linear-gradient(135deg, rgba(255, 243, 236, 0.35), rgba(255, 255, 255, 0) 42%),
        var(--white);
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .blog-frame::after {
      content: "";
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(229, 231, 235, 0.96);
      border-radius: 16px;
      pointer-events: none;
      z-index: 4;
    }

    .canvas {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
      padding: 44px 54px 40px;
    }

    .page-title {
      max-width: 700px;
      margin: 0 auto;
      color: var(--navy);
      font-size: 25px;
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: 0;
      text-align: center;
    }

    .table-head {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      max-width: 730px;
      width: 100%;
      margin: 0 auto;
    }

    .head-cell {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-radius: 14px;
      color: var(--white);
      background: var(--navy);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.15;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    .head-cell.impact {
      background: var(--orange);
    }

    .mistake-board {
      min-height: 0;
      max-width: 730px;
      width: 100%;
      margin: 0 auto;
      display: grid;
      gap: 8px;
    }

    .mistake-row {
      position: relative;
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px minmax(0, 1fr);
      align-items: stretch;
      gap: 8px;
      min-height: 58px;
      padding: 0;
      border: 0;
      border-radius: 18px;
      background: transparent;
      color: var(--navy);
      font: inherit;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      box-shadow: none;
      transition: transform 0.22s ease;
    }

    .mistake-row::before {
      content: none;
    }

    .mistake-row:hover,
    .mistake-row:focus-visible,
    .mistake-row.is-active {
      outline: none;
      transform: translateY(-2px);
    }

    .mistake-cell,
    .impact-cell,
    .connector {
      position: relative;
      z-index: 1;
    }

    .mistake-cell,
    .impact-cell {
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 9px;
      min-width: 0;
      min-height: 58px;
      height: 100%;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
      border-radius: 16px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, #ffffff), #ffffff);
      box-shadow: var(--shadow-sm);
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .impact-cell {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 6%, #ffffff), #ffffff);
    }

    .mistake-row:hover .mistake-cell,
    .mistake-row:focus-visible .mistake-cell,
    .mistake-row.is-active .mistake-cell,
    .mistake-row:hover .impact-cell,
    .mistake-row:focus-visible .impact-cell,
    .mistake-row.is-active .impact-cell {
      border-color: color-mix(in srgb, var(--accent) 58%, var(--border));
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 13%, #ffffff), #ffffff);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.11);
    }

    .cell-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      align-self: center;
      justify-self: center;
      border-radius: 13px;
      color: var(--white);
      background: var(--accent);
      flex: 0 0 auto;
      transition: transform 0.22s ease;
    }

    .impact-cell .cell-icon {
      background: color-mix(in srgb, var(--accent) 72%, var(--navy));
    }

    .mistake-row:hover .cell-icon,
    .mistake-row:focus-visible .cell-icon,
    .mistake-row.is-active .cell-icon {
      transform: scale(1.08);
    }

    .cell-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      display: block;
      margin: auto;
    }

    .cell-text {
      min-width: 0;
      color: var(--navy);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .impact-cell .cell-text {
      color: color-mix(in srgb, var(--navy) 90%, var(--accent));
    }

    .connector {
      align-self: center;
      height: 6px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 24%, #dbe4ef);
      overflow: hidden;
    }

    .connector::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--accent);
      transform: scaleX(0.34);
      transform-origin: left;
      transition: transform 0.22s ease;
    }

    .mistake-row:hover .connector::after,
    .mistake-row:focus-visible .connector::after,
    .mistake-row.is-active .connector::after {
      transform: scaleX(1);
    }
  </style>
</head>
<body>
  <main class="blog-frame">
    <div class="canvas">
      <h1 class="page-title">Know Why AI Chatbots Fail & Impact</h1>

      <div class="table-head" aria-hidden="true">
        <div class="head-cell">Common AI Chatbot Mistake</div>
        <div class="head-cell impact">Potential Impact</div>
      </div>

      <section class="mistake-board" aria-label="Common AI chatbot mistakes and potential impact">
        <button class="mistake-row is-active" type="button" aria-pressed="true" style="--accent: var(--orange);">
          <span class="mistake-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 4a2 2 0 0 1 2-2h8a2 2 0 0 1 1.41.59l4 4A2 2 0 0 1 20 8v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4Zm10 0v5h4l-4-5ZM8 13a1 1 0 1 0 0 2h7a1 1 0 1 0 0-2H8Zm0 4a1 1 0 1 0 0 2h4a1 1 0 1 0 0-2H8Z" /></svg>
            </span>
            <span class="cell-text">Poor training data</span>
          </span>
          <span class="connector" aria-hidden="true"></span>
          <span class="impact-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2Zm0 5a1 1 0 0 1 1 1v4a1 1 0 1 1-2 0V8a1 1 0 0 1 1-1Zm0 10.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5Z" /></svg>
            </span>
            <span class="cell-text">Inaccurate or misleading responses</span>
          </span>
        </button>

        <button class="mistake-row" type="button" aria-pressed="false" style="--accent: var(--blue);">
          <span class="mistake-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12.8 2.14a1 1 0 0 0-1.6 0L8.68 5.5 4.5 6.72a1 1 0 0 0-.55 1.55l2.56 3.58-.12 4.4a1 1 0 0 0 1.3.98L12 15.72l4.31 1.51a1 1 0 0 0 1.3-.98l-.12-4.4 2.56-3.58a1 1 0 0 0-.55-1.55L15.32 5.5 12.8 2.14Z" /></svg>
            </span>
            <span class="cell-text">AI hallucinations</span>
          </span>
          <span class="connector" aria-hidden="true"></span>
          <span class="impact-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 2 4 5.5v5.85c0 4.85 3.15 8.3 8 10.65 4.85-2.35 8-5.8 8-10.65V5.5L12 2Zm3.86 8.86-4.6 4.6a1 1 0 0 1-1.42 0l-1.9-1.9a1 1 0 0 1 1.42-1.42l1.19 1.2 3.89-3.9a1 1 0 0 1 1.42 1.42Z" /></svg>
            </span>
            <span class="cell-text">Loss of customer trust</span>
          </span>
        </button>

        <button class="mistake-row" type="button" aria-pressed="false" style="--accent: var(--green);">
          <span class="mistake-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-5 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm3 5a1 1 0 1 0 0 2h7a1 1 0 1 0 0-2H7Zm0 4a1 1 0 1 0 0 2h4a1 1 0 1 0 0-2H7Z" /></svg>
            </span>
            <span class="cell-text">Weak conversation design</span>
          </span>
          <span class="connector" aria-hidden="true"></span>
          <span class="impact-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0-9 9v3a3 3 0 0 0 3 3h1a1 1 0 0 0 1-1v-5a1 1 0 0 0-1-1H5.08a7 7 0 0 1 13.84 0H17a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h1a3 3 0 0 0 3-3v-3a9 9 0 0 0-9-9Z" /></svg>
            </span>
            <span class="cell-text">Frustrating user experiences</span>
          </span>
        </button>

        <button class="mistake-row" type="button" aria-pressed="false" style="--accent: var(--purple);">
          <span class="mistake-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 3a8 8 0 0 0-8 8v3a3 3 0 0 0 3 3h1a1 1 0 0 0 1-1v-5a1 1 0 0 0-1-1H6.08A6 6 0 0 1 18 10h-2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h1.35A5 5 0 0 1 13 20h-2a1 1 0 1 0 0 2h2a7 7 0 0 0 7-7v-4a8 8 0 0 0-8-8Z" /></svg>
            </span>
            <span class="cell-text">No human escalation path</span>
          </span>
          <span class="connector" aria-hidden="true"></span>
          <span class="impact-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-6l-5 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm8 3a1 1 0 0 0-1 1v4a1 1 0 1 0 2 0V8a1 1 0 0 0-1-1Zm0 8.25a1.25 1.25 0 1 0 0-2.5 1.25 1.25 0 0 0 0 2.5Z" /></svg>
            </span>
            <span class="cell-text">Unresolved customer issues</span>
          </span>
        </button>

        <button class="mistake-row" type="button" aria-pressed="false" style="--accent: var(--teal);">
          <span class="mistake-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M7 2a1 1 0 0 1 1 1v4h3V3a1 1 0 1 1 2 0v4h1a4 4 0 0 1 4 4v2h2a1 1 0 1 1 0 2h-2v2a5 5 0 0 1-5 5H8a1 1 0 1 1 0-2h5a3 3 0 0 0 3-3v-6a2 2 0 0 0-2-2H7a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1ZM4.7 15.3a1 1 0 0 1 1.4 0l1.4 1.4 1.4-1.4a1 1 0 0 1 1.4 1.4L8.9 18l1.4 1.3a1 1 0 1 1-1.4 1.4l-1.4-1.4-1.4 1.4a1 1 0 0 1-1.4-1.4L6.1 18l-1.4-1.3a1 1 0 0 1 0-1.4Z" /></svg>
            </span>
            <span class="cell-text">Poor integrations</span>
          </span>
          <span class="connector" aria-hidden="true"></span>
          <span class="impact-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 3h16a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm2 5a1 1 0 1 0 0 2h12a1 1 0 1 0 0-2H6Zm0 4a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2H6Zm0 4a1 1 0 1 0 0 2h5a1 1 0 1 0 0-2H6Z" /></svg>
            </span>
            <span class="cell-text">Incomplete or inconsistent information</span>
          </span>
        </button>

        <button class="mistake-row" type="button" aria-pressed="false" style="--accent: var(--red);">
          <span class="mistake-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-5v2h2a1 1 0 1 1 0 2H7a1 1 0 1 1 0-2h2v-2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v10h16V6H4Zm4 7a1 1 0 0 1-.8-1.6l2-2.67a1 1 0 0 1 1.54-.08l1.45 1.45 2.01-3.36a1 1 0 0 1 1.6-.15l2 2.2a1 1 0 0 1-1.48 1.34l-1.09-1.2-1.95 3.25a1 1 0 0 1-1.56.2l-1.59-1.59-1.33 1.78A1 1 0 0 1 8 13Z" /></svg>
            </span>
            <span class="cell-text">Lack of monitoring and optimization</span>
          </span>
          <span class="connector" aria-hidden="true"></span>
          <span class="impact-cell">
            <span class="cell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 18h16a1 1 0 1 1 0 2H4a1 1 0 1 1 0-2Zm2-2a1 1 0 0 1-1-1V9a1 1 0 1 1 2 0v6a1 1 0 0 1-1 1Zm4 0a1 1 0 0 1-1-1v-4a1 1 0 1 1 2 0v4a1 1 0 0 1-1 1Zm4 0a1 1 0 0 1-1-1V7a1 1 0 1 1 2 0v8a1 1 0 0 1-1 1Zm4 0a1 1 0 0 1-1-1V5a1 1 0 1 1 2 0v10a1 1 0 0 1-1 1Z" /></svg>
            </span>
            <span class="cell-text">Declining chatbot performance over time</span>
          </span>
        </button>
      </section>
    </div>
  </main>

  <script>
    const rows = document.querySelectorAll(".mistake-row");

    rows.forEach((row) => {
      row.addEventListener("click", () => {
        rows.forEach((item) => {
          item.classList.toggle("is-active", item === row);
          item.setAttribute("aria-pressed", item === row ? "true" : "false");
        });
      });
    });
  </script>
</body>
</html>

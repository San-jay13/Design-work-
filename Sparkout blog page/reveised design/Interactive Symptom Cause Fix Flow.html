<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Symptom Cause Fix Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --content-width: 915px;
      --white: #ffffff;
      --page-bg: #f8fafc;
      --font: #0b1220;
      --navy: #192a44;
      --muted: #6b7280;
      --stroke: #64748b;
      --border: #e5e7eb;
      --orange: #ff6c1a;
      --orange-deep: #ff4d0d;
      --soft-orange: #fff4ec;
      --soft-green: #ecfdf5;
      --green: #14885f;
      --soft-blue: #eff6ff;
      --blue: #2563eb;
      --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      background:
        linear-gradient(90deg, rgba(255, 108, 26, 0.045) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(25, 42, 68, 0.04) 0 1px, transparent 1px 100%),
        var(--page-bg);
      background-size: 42px 42px;
      color: var(--font);
      font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .flow-section {
      width: min(100%, var(--content-width));
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 108, 26, 0.09), transparent 26%),
        linear-gradient(135deg, rgba(255, 244, 236, 0.7), rgba(255, 255, 255, 0.9) 46%, rgba(248, 250, 252, 0.94)),
        var(--white);
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .flow-section::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(229, 231, 235, 0.92);
      border-radius: 16px;
      pointer-events: none;
      z-index: 1;
    }

    .flow-section::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(100, 116, 139, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 116, 139, 0.07) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.52), transparent 82%);
      z-index: -1;
    }

    .flow-canvas {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(390px, 1.08fr);
      gap: 28px;
      align-items: stretch;
      min-height: 640px;
      padding: 58px;
    }

    .symptom-panel,
    .flow-panel {
      min-width: 0;
      border: 1px solid rgba(229, 231, 235, 0.98);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .panel-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(14px);
    }

    .panel-header strong {
      display: block;
      color: var(--navy);
      font-size: 20px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .panel-header span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.5;
    }

    .symptom-list {
      display: grid;
      gap: 9px;
      padding: 18px;
    }

    .symptom-button {
      width: 100%;
      min-height: 56px;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 11px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--navy);
      font: inherit;
      text-align: left;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .symptom-button:hover,
    .symptom-button:focus-visible {
      outline: none;
      border-color: rgba(255, 108, 26, 0.34);
      transform: translateX(3px);
    }

    .symptom-button.is-active {
      border-color: rgba(255, 108, 26, 0.28);
      background: var(--soft-orange);
      box-shadow: 0 12px 24px rgba(255, 108, 26, 0.12);
    }

    .button-index {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: var(--orange);
      background: var(--soft-orange);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .symptom-button.is-active .button-index {
      color: var(--white);
      background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    }

    .symptom-button span:last-child {
      min-width: 0;
      color: var(--navy);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .flow-panel {
      display: flex;
      flex-direction: column;
    }

    .flow-body {
      flex: 1;
      display: grid;
      align-content: center;
      gap: 15px;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.72), rgba(255, 255, 255, 0.96)),
        var(--white);
    }

    .flow-step {
      position: relative;
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 14px;
      align-items: center;
      min-height: 112px;
      padding: 18px;
      border: 1px solid color-mix(in srgb, var(--step-color) 18%, var(--border));
      border-radius: var(--radius-lg);
      background: color-mix(in srgb, var(--step-color) 7%, var(--white));
      box-shadow: var(--shadow-md);
      opacity: 0;
      transform: translateY(14px);
      animation: stepReveal 0.46s ease forwards;
    }

    .flow-step:nth-child(2) {
      animation-delay: 0.12s;
    }

    .flow-step:nth-child(3) {
      animation-delay: 0.24s;
    }

    .flow-step + .flow-step::before {
      content: "";
      position: absolute;
      left: 41px;
      top: -16px;
      width: 2px;
      height: 16px;
      background: var(--orange);
      opacity: 0.5;
    }

    .flow-step + .flow-step::after {
      content: "";
      position: absolute;
      left: 36px;
      top: -9px;
      width: 12px;
      height: 12px;
      border-right: 2px solid var(--orange);
      border-bottom: 2px solid var(--orange);
      transform: rotate(45deg);
      opacity: 0.8;
    }

    .step-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      color: var(--step-color);
      background: color-mix(in srgb, var(--step-color) 10%, var(--white));
      border: 1px solid color-mix(in srgb, var(--step-color) 22%, var(--border));
      line-height: 0;
    }

    .step-icon svg {
      width: 22px;
      height: 22px;
      display: block;
      stroke-width: 2.2;
    }

    .step-copy b {
      display: block;
      color: var(--step-color);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .step-copy strong {
      display: block;
      margin-top: 6px;
      color: var(--navy);
      font-size: 17px;
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .hint-strip {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.55;
    }

    @keyframes stepReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 26px 14px;
      }

      .flow-canvas {
        grid-template-columns: 1fr;
        min-height: 0;
        padding: 38px 30px;
      }
    }

    @media (max-width: 560px) {
      .flow-section::before {
        inset: 14px;
      }

      .flow-canvas {
        gap: 22px;
        padding: 28px 20px;
      }

      .flow-step {
        grid-template-columns: 1fr;
      }

      .flow-step + .flow-step::before,
      .flow-step + .flow-step::after {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="flow-section" aria-label="Interactive symptom cause fix table">
    <div class="flow-canvas">
      <section class="symptom-panel" aria-label="Symptoms">
        <header class="panel-header">
          <strong>Symptom</strong>
          <span>Click a symptom to reveal the likely cause and recommended fix.</span>
        </header>

        <div class="symptom-list" id="symptomList"></div>
      </section>

      <section class="flow-panel" aria-label="Symptom cause fix flow">
        <header class="panel-header">
          <strong>SYMPTOM ↓ CAUSE ↓ FIX</strong>
          <span>Animation: Click symptom → reveal cause and fix.</span>
        </header>

        <div class="flow-body" id="flowBody"></div>

        <footer class="hint-strip">
          Select any row from the symptom list to see the full table content as an interactive flow.
        </footer>
      </section>
    </div>
  </main>

  <script>
    const rows = [
      {
        symptom: "Chatbot giving inaccurate answers",
        cause: "Poor training data/outdated knowledge base",
        fix: "Update & retrain the chatbot with reliable data"
      },
      {
        symptom: "Customers abandon conversations",
        cause: "Weak conversation design/poor user flow",
        fix: "Simplify conversation paths & improve chatbot guidance"
      },
      {
        symptom: "Responses vary for similar questions",
        cause: "Inconsistent prompts or fragmented information sources",
        fix: "Standardize prompts & centralize knowledge"
      },
      {
        symptom: "Chatbot generates incorrect information",
        cause: "AI hallucinations or lack of grounding",
        fix: "Implement Retrieval-Augmented Generation (RAG)"
      },
      {
        symptom: "Support tickets continue increasing",
        cause: "Chatbot fails to resolve customer issues",
        fix: "Improve intent recognition & escalation workflows"
      },
      {
        symptom: "Customers request human support frequently",
        cause: "No clear escalation path",
        fix: "Enable seamless handoff to live agents"
      },
      {
        symptom: "Chatbot performance declines over time",
        cause: "Lack of monitoring & optimization",
        fix: "Regularly review conversations & retrain the chatbot"
      }
    ];

    const symptomList = document.getElementById("symptomList");
    const flowBody = document.getElementById("flowBody");

    function icon(label) {
      if (label === "SYMPTOM") {
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z" /><path d="M9 9h6M9 13h4" /></svg>`;
      }

      if (label === "CAUSE") {
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 9v4" /><path d="M12 17h.01" /><path d="m10.3 3.9-8.1 14A2 2 0 0 0 3.9 21h16.2a2 2 0 0 0 1.7-3.1l-8.1-14a2 2 0 0 0-3.4 0z" /></svg>`;
      }

      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 6 9 17l-5-5" /><circle cx="12" cy="12" r="10" /></svg>`;
    }

    function renderFlow(index) {
      const row = rows[index];
      const flow = [
        { label: "SYMPTOM", text: row.symptom, color: "var(--orange)" },
        { label: "CAUSE", text: row.cause, color: "var(--blue)" },
        { label: "FIX", text: row.fix, color: "var(--green)" }
      ];

      flowBody.innerHTML = flow.map((item) => `
        <article class="flow-step" style="--step-color: ${item.color};">
          <div class="step-icon" aria-hidden="true">${icon(item.label)}</div>
          <div class="step-copy">
            <b>${item.label}</b>
            <strong>${item.text}</strong>
          </div>
        </article>
      `).join("");

      Array.from(symptomList.children).forEach((button, buttonIndex) => {
        const isActive = buttonIndex === index;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", isActive ? "true" : "false");
      });
    }

    rows.forEach((row, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "symptom-button";
      button.setAttribute("aria-pressed", "false");
      button.innerHTML = `<span class="button-index">${index + 1}</span><span>${row.symptom}</span>`;
      button.addEventListener("click", () => renderFlow(index));
      symptomList.appendChild(button);
    });

    renderFlow(0);
  </script>
</body>
</html>
